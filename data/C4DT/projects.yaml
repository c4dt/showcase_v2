projects:
  demo-eid:
    name: Issuer & Verifier for the Swiss e-ID 2023 sandbox
    categories:
      - Security
      - Privacy
    applications:
      - Gov
    type: Application
    description:
      Demo for the swiss E-ID ledger. It includes an issuer and a verifier.
    tech_desc: >
      The issuer is a web application that allows to create a new identity and
      issue a credential.  The verifier is a web application that allows to
      verify the credential.
    layman_desc: >
      This is a live demonstration of the Swiss electronic identity system,
      showing how a digital ID can be issued and then verified by a third party.
      It lets you experience how future government-issued digital credentials
      could work in practice, without needing to understand the underlying
      cryptography.
    code:
      type: Lab GitHub
      url: https://github.com/c4dt/eid-demo
      date_last_commit: 2024-02-08
    language: TypeScript
    tags:
      - Access Control
      - Development
    maturity: 0
    date_added: 2024-01-09
    date_updated: 2024-01-09
  innosuisse-eid:
    name: Secure and Privacy-Preserving Credentials for E-ID
    categories:
      - Security
      - Privacy
    applications:
      - Gov
    type: Grant
    description:
      Research techniques to improve privacy when using electronic identities
    tech_desc: >
      Today's identity security faces challenges like misuse and tracking. Our
      goal is to enable secure, anonymous, unlinkable E-ID interactions by
      researching novel cryptographic algorithms. This boosts user trust,
      creates new business opportunities, and cuts financial losses after data
      breaches.
    layman_desc: >
      When you use a digital identity card online, today's systems often reveal
      more personal information than necessary and allow your activities to be
      tracked. This research project develops new cryptographic techniques so
      that Swiss e-ID users can prove who they are without exposing unnecessary
      details or being identifiable across different services.
    url: https://eid-privacy.github.io/
    code:
      type: Project GitHub
      url: https://github.com/eid-privacy
      date_last_commit: 2026-04-07
    incubator:
      work: "Research Grant"
      type: "incubated"
      products:
        - type: "Project"
          url: https://github.com/eid-privacy
          title: "e-ID Privacy github organization"
        - type: "Blog"
          url: https://eid-privacy.github.io
          title: "Blog of project steps"
        - type: White paper
          url: >-
            https://eid-privacy.github.io/wp1/2025/09/17/taxonomy-of-digital-identity-systems.html
          title: Taxonomy of Digital Identity Systems
        - type: Report
          url: https://eid-privacy.github.io/2026/01/09/poc-report.html
          title: PoC Report
    language: "Rust, Typst, TypeScript"
    logo: /products/images/innosuisse-eid/innosuisse-eid.png
    tags:
      - Access Control
      - Decentralized
      - Zero-Knowledge Proofs
    maturity: 2
    date_added: 2025-04-01
    date_updated: 2026-03-27
  seal-phishing:
    name: "Combattre le phishing: quelles innovations apporter ?"
    categories:
      - Security
    applications:
      - Gov
      - Infra
    type: Grant
    description:
      Combating phishing through vulnerability analysis, detection tools, and
      best practice guidelines.
    tech_desc: >
      This project addresses phishing threats through the analysis of existing
      countermeasures, identification of vulnerabilities, and development of
      innovative solutions including best practice guidelines and tools for
      email configuration testing and malicious link detection. The initiative
      enhances organizational and societal resilience against phishing attacks
      through knowledge dissemination and fosters collaboration among
      stakeholders.
    layman_desc: >
      This project tackles phishing—a common online scam where criminals trick
      people into clicking dangerous links or sharing personal information
      through deceptive emails. It develops practical guides and easy-to-use
      tools to help individuals and organizations recognize and protect
      themselves against these attacks.
    tags:
      - Attack
      - Cloud
      - Exploit
      - Protection
    incubator:
      work: "Research Grant"
      type: "incubated"
    logo: /products/images/seal-phishing/seal-phishing.png
    maturity: 3
    date_added: 2025-04-01
    date_updated: 2026-01-16
    url: https://seal-innovation.ch/en/combating-phishing/
  seal-digiinov:
    name:
      Sécurisation de Digiinov Hmi en adéquation avec le Cyber Resilience Act
      (CRA)
    categories:
      - Security
    applications:
      - Gov
    type: Grant
    description:
      Securing industrial HMI software for EU Cyber-Resilience-Act compliance
    tech_desc: >
      This project integrates state-of-the-art software security measures into
      Digiinov HMI, a platform bridging Operational Technology (OT) and
      Information Technology (IT) for industrial Human-Machine Interfaces. The
      collaboration with HEIG-VD and EPFL focuses on achieving compliance with
      the EU Cyber-Resilience-Act (CRA) requirements before its 2027
      enforcement. The security enhancements target the software development
      lifecycle and maintenance processes for embedded industrial control
      systems.
    layman_desc: >
      This project enhances the security of software used to control and monitor
      industrial machines, preparing it for new European cybersecurity
      regulations. The EU's Cyber-Resilience-Act requires software products to
      meet strict security standards starting in 2027, protecting users from
      digital threats. By partnering with academic cybersecurity experts, this
      project ensures machine manufacturers can offer secure, compliant products
      ahead of schedule.
    tags:
      - Code Analysis
      - Large Language Model
    incubator:
      work: "Research Grant"
      type: "incubated"
    logo: /products/images/seal-digiinov/seal-digiinov.png
    maturity: 0
    date_added: 2026-01-16
    date_updated: 2026-01-16
  hands-on-eid:
    name: E-ID Hands-on Workshop
    categories:
      - Security
      - Privacy
    applications:
      - Gov
    type: Hands-on
    description:
      A hands-on workshop showing how cryptography can preserve privacy and
      security of an E-ID solution.
    tech_desc: >
      To protect the privacy of the users of E-ID systems, several technical
      measures need to be taken. This workshop demonstrates the workings of
      Self-Sovereign Identities, using selective disclosure  for data
      protection, and explores further safeguards like unlinkability through
      BBS+ and  zero-knowledge proofs to share only essential information.
    layman_desc: >
      This hands-on workshop teaches participants how a privacy-preserving
      digital identity card works, using real code and interactive exercises.
      You will learn how modern cryptographic techniques let you prove your age
      or citizenship without revealing your name or address, and why this
      matters for everyday privacy.
    code:
      type: Lab GitHub
      url: https://github.com/c4dt/eid-workshop
      date_last_commit: 2025-04-04
    language: TypeScript
    tags:
      - Access Control
      - Development
    incubator:
      type: retired
      work: 2024/Q3 E-ID Cryptography
      products:
        - type: Hands-on
          title: E-ID Hands-on Workshop
          url: https://github.com/c4dt/eid-workshop/
    date_added: 2024-11-21
    date_updated: 2024-11-21
  matrix-epfl:
    name: Matrix@EPFL
    categories:
      - Security
      - Privacy
    applications:
      - Infra
    type: Application
    description: >
      The Matrix server run for the EPFL community by the EPFL Center for
      Imaging with help from the EPFL Center for Digital Trust.
    layman_desc: >
      Matrix is a widely used open source chat platform. It is an alternative to
      platforms such as Slack and MSTeams. Edward Andò from the Imaging Center
      at EPFL started an EPFL-wide instance, matrix.epfl.ch, in 2023. It
      advances digital trust at the whole EPFL while also having a broader
      positive impact. Thinking ahead and planning to eventually move the users
      of matrix.c4dt.org to this EPFL-wide instance, C4DT reached out to Edward
      Andò to offer our support bolstering matrix.epfl.ch’s team, which was
      readily welcomed.
    tech_desc: >
      Matrix@EPFL is a self-hosted deployment of the Matrix open federation
      protocol, running a Synapse homeserver for the EPFL community. It provides
      end-to-end encrypted messaging, room-based collaboration, and federation
      with the broader Matrix network, serving as a privacy-respecting
      alternative to proprietary chat platforms.
    tags:
      - Protection
      - Decentralized
      - Encryption
    incubator:
      type: incubated
      work: 2023/Q4 - maintenance and development
    url: https://matrix.epfl.ch
    information:
      - type: Article
        url: https://c4dt.epfl.ch/article/report-2024-matrix-epfl-ch/
        title: Report 2024 matrix.epfl.ch
    date_added: 2025-03-04
    date_updated: 2025-03-04
