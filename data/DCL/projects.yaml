        url: https://infoscience.epfl.ch/record/282767
        notes:
          - label: Published at
            text: ACM/IFIP Middleware 2020
            url: https://2020.middleware-conference.org
    date_added: 2020-11-11
    date_updated: 2024-03-22
  mvtil:
    name: MVTIL
    categories:
      - Security
    applications:
      - Infra
    description: Multiversion Timestamp Locking (MVTL)
    layman_desc: >
      Databases need to handle many simultaneous read and write operations
      without corrupting data. MVTIL introduces a new family of locking
      strategies that allow reads to use slightly older data versions, reducing
      waiting time and improving overall database throughput.
    tech_desc: >
      MVTL is a new family of concurrency control algorithms. Improving
      performance of distributed databases by allowing read accesses to lag
      behind the latest version of the data.
    code:
      type: Lab GitHub
      url: https://github.com/LPD-EPFL/MVTIL
      date_last_commit: 2019-09-19
    tags:
      - Concurrency
      - Database
      - Locking
    type: Application
    language: C++
    license: GPL-2.0
    information:
      - type: Paper
        title: Locking Timestamps versus Locking Objects
        url: https://infoscience.epfl.ch/record/229425
        notes:
          - label: Published at
            text: PODC 2018
            url: https://www.podc.org/podc2018
    date_added: 2019-09-19
    date_updated: 2024-03-22
  libnvram:
    name: libNVRAM
    categories:
      - Security
    applications:
      - Infra
    description: Log-free concurrent data structures
    layman_desc: >
      Storing data structures in non-volatile RAM such that transient failures
      don't corrupt the data.
    tech_desc: >
      libNVRAM provides lock-free and lock-based concurrent data structures
      (linked lists, hash tables, skip lists) designed for non-volatile RAM
      (NVRAM). It eliminates the need for write-ahead logging by ensuring that
      data structures remain consistent across failures at the hardware level,
      achieving crash-safe persistence without the performance overhead of
      traditional journaling.
    url: http://dcl.epfl.ch/site/nvram
    code:
      type: Lab Github
      url: https://github.com/LPD-EPFL/nv-lf-structures
      date_last_commit: 2019-11-04
    tags:
      - Concurrency
      - Data Structures
      - Failure
    type: Library, Application
    language: C++
    license: MIT
    information:
      - type: Paper
        title: Log-Free Concurrent Data Structures
        url: https://infoscience.epfl.ch/record/232485
        notes:
          - label: Published at
            text: ATC 2018
            url: https://www.usenix.org/conference/atc18/presentation/david
    date_added: 2019-03-18
    date_updated: 2024-03-22
  flodb:
    name: FloDB
    categories:
      - Security
    applications:
      - Infra
    description: Unlocking memory in persistent key-value stores
    layman_desc: >
      High performance key-value store for servers with high amount of RAM and
      lots of CPUs.
    tech_desc: >
      FloDB is a persistent key-value store that exploits large DRAM capacities
      on multi-core servers by maintaining a multi-level architecture: a small
      concurrent in-memory buffer feeds a larger DRAM-resident skip list, which
      is periodically flushed to an LSM-tree on persistent storage. This design
      decouples memory bandwidth from I/O bottlenecks, achieving high throughput
      on write-heavy workloads.
    url: http://dcl.epfl.ch/site/flodb
    code:
      type: Lab GitHub
      url: https://github.com/LPD-EPFL/flodb
      date_last_commit: 2017-03-28
    tags:
      - Database
      - Server
    type: Application
    language: C++
    license: BSD-3-Clause
    information:
      - type: Paper
        title: "FloDB: Unlocking Memory in Persistent Key-Value Stores"
        url: https://infoscience.epfl.ch/record/227333
        notes:
          - label: Published at
            text: EuroSys 2017
            url: https://eurosys2017.github.io
    date_added: 2019-03-18
    date_updated: 2024-03-22
  fleet:
    name: FLeet
    categories:
      - Learning
    applications:
      - Info
    description: Federated machine learning on Android
    layman_desc: >
      MobNet is a framework for federated machine learning on Android devices.
      It consumes much less battery than Standard FL while increasing the
      model's accuracy three times. It allows for Android to actually
      participate in the building of a ML model.
    tech_desc: >
      FLeet is a federated learning framework for Android that addresses the
      heterogeneity of mobile hardware by combining staleness-aware gradient
      aggregation with performance prediction. It selects and weights worker
      contributions based on predicted compute speed, reducing idle waiting and
      improving convergence speed and final model accuracy compared to
      synchronous federated learning baselines.
    code:
      type: Non-lab GitHub
      url: https://github.com/gdamaskinos/fleet
      date_last_commit: 2020-10-31
    tags:
      - Federated Learning
      - Mobile App
    type: Library, Application
    language: Java, C++
    license: MIT
    maturity: 1
    information:
      - type: Paper
        title:
          "FLeet: Online Federated Learning via Staleness Awareness and
          Performance Prediction"
        url: https://infoscience.epfl.ch/record/282766
        notes:
          - label: Published at
            text: ACM/IFIP Middleware 2020
            url: https://2020.middleware-conference.org
    date_added: 2019-07-01
    date_updated: 2024-03-22
  mctop:
    name: MCTOP
    categories:
      - Security
    applications:
      - Infra
    description: A multi-core topology abstraction
    layman_desc: >
      MCTOP is an abstraction of multi-core topologies augmented with important
      low-level hardware information, such as memory bandwidths and
      communication latencies.
    tech_desc: >
      MCTOP automatically constructs a hardware topology model for multi-core
      processors by measuring inter-core communication latencies and memory
      bandwidths at runtime. It exposes this model as a portable C API so that
      system software and concurrent data structure libraries can make
      topology-aware scheduling and memory placement decisions without requiring
      manual hardware configuration.
    url: https://dcl.epfl.ch/site/mctop
    code:
      type: Lab GitHub
      url: https://github.com/LPD-EPFL/mctop
      date_last_commit: 2017-05-04
    tags:
      - Server
    type: Application
    language: C
    license: MIT
    information:
      - type: Paper
        title: Abstracting Multi-Core Topologies with MCTOP
        url: https://infoscience.epfl.ch/record/227458
        notes:
          - label: Published at
            text: EuroSys 2017
            url: https://eurosys2017.github.io
    date_added: 2019-07-26
    date_updated: 2024-03-22
  lockin:
    name: LOCKIN
    categories:
      - Security
    applications:
      - Infra
    description: Automatically chose the best locking algorithm
    layman_desc: >
      LOCKIN is a lock library that includes several lock algorithm
      implementations mainly in header files for ease of use. Essentially, you
      can use LOCKIN to easily modify the pthread mutex locks in a system with
      practically zero effort. GLS is a middleware that makes lock-based
      programming simple and effective. GLS offers the classic lock-unlock
      interface of locks. However, in contrast to classic lock libraries, GLS
      does not require any effort from the programmer for allocating and
      initializing locks, nor for selecting the appropriate locking strategy.
    tech_desc: >
      LOCKIN provides header-only implementations of multiple locking algorithms
      (MCS, CLH, TTAS, etc.) as drop-in replacements for pthreads mutexes. Its
      companion middleware GLS dynamically selects the optimal algorithm at
      runtime based on observed contention patterns, reducing energy consumption
      and improving throughput without requiring programmers to reason about
      low-level lock behaviour.
    url: https://dcl.epfl.ch/site/lockin
    code:
      type: Lab GitHub
      url: https://github.com/LPD-EPFL/lockin
      date_last_commit: 2017-04-19
    tags:
      - Concurrency
    type: Library
    language: C/C++
    license: MIT
    information:
      - type: Paper
        title: Unlocking Energy
        url: https://infoscience.epfl.ch/record/221135
        notes:
          - label: Published at
            text: ATC 2016
            url: https://www.usenix.org/conference/atc16
      - type: Paper
        title: Locking Made Easy
        url: https://infoscience.epfl.ch/record/222954
        notes:
          - label: Published at
            text: ACM/IFIP Middleware 2016
            url: http://2016.middleware-conference.org
    date_added: 2019-07-01
    date_updated: 2024-03-22
  aggregathor:
    name: AggregaThor
    categories:
      - Learning
    applications:
      - Info
    description:
      Framework over TensorFlow implementing robust stochastic gradient descent
    layman_desc: >
      Framework built over TensorFlow implementing state-of-the-art
      Byzantine-resilient, distributed Stochastic Gradient Descent (SGD).
      Modular approach allows most of its components to be reused in other
      projects. Unreliable communication channels are supported, providing a
      performance speed-up over standard TensorFlow in saturated networks.
    tech_desc: >
      AggregaThor is a distributed SGD framework layered over TensorFlow that
      integrates pluggable Byzantine-resilient gradient aggregation rules (e.g.
      Krum, Bulyan, coordinate-wise median) and supports asynchronous
      parameter-server topologies. It tolerates both Byzantine worker failures
      and unreliable network links, and its modular design allows aggregation
      rules and communication backends to be swapped independently.
    code:
      type: Lab GitHub
      url: https://github.com/LPD-EPFL/AggregaThor
      date_last_commit: 2019-12-06
    tags:
      - Distributed Learning
      - Byzantine Resilience
      - TensorFlow
    type: Library, Application
    language: Python / C++
    information:
      - type: Paper
        url: https://infoscience.epfl.ch/record/265684
        title:
          "AggregaThor: Byzantine Machine Learning via Robust Gradient
          Aggregation"
        notes:
          - label: Published at
            text: SysML 2019
            url: https://mlsys.org/Conferences/2019
    date_added: 2019-03-18
    date_updated: 2024-03-22
  ascylib-optik:
    name: ASCYLIB + OPTIK
    categories:
      - Security
    applications:
      - Infra
    description: State-of-the-art concurrent data-structure library
    layman_desc: >
      Over 40 implementations of linked lists, hash tables, skip lists, binary
      search trees (BSTs), queues, priority queues, and stacks. ASCYLIB contains
      sequential, lock-based, and lock-free implementations for each data
      structure.
    tech_desc: >
      ASCYLIB is a comprehensive benchmark suite and library of over 40
      concurrent search data structure implementations in C, covering linked
      lists, skip lists, hash tables, BSTs, queues, and priority queues in
      sequential, lock-based, and lock-free variants. OPTIK is a design pattern
      embedded within ASCYLIB that uses optimistic versioned locking to simplify
      the construction of correct and high-performance concurrent data
      structures.
    url: https://dcl.epfl.ch/site/ascylib
    code:
      type: Lab GitHub
      url: https://github.com/LPD-EPFL/ASCYLIB
      date_last_commit: 2018-01-19
