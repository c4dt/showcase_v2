  nn-fault-tolerance:
    name:
      Probabilistic Fault Tolerance of Neural Networks in the Continuous Limit
    categories:
      - Learning
    applications:
      - Info
    type: Library
    description: Regularizer for failing neurons
    layman_desc: >
      How is a neural network changing its output in presence of failing node?
      This project provides a regularizer adapting itself to changing
      conditions.
    tech_desc: >
      This work derives a closed-form probabilistic model of how neuron failures
      (permanent or transient) propagate through a deep neural network in the
      continuous-width limit. It uses this model to design a regulariser that,
      when added to standard training loss, encourages the network to learn
      weight distributions that are inherently robust to runtime neuron
      failures, without requiring fault injection during training.
    code:
      type: Lab GitHub
      url: https://github.com/LPD-EPFL/nn-fault-tolerance
      date_last_commit: 2020-11-24
    license: other
    tags:
      - Deep Neural Networks
    language: Python
    information:
      - type: Paper
        title:
          The Probabilistic Fault Tolerance of Neural Networks in the Continuous
          Limit
        url: https://arxiv.org/abs/1902.01686
    date_added: 2022-07-04
    date_updated: 2024-03-22

  ukharon:
    name: uKharon
    categories:
      - Other
    applications:
      - Info
    description: Membership service for microsecond applications
    layman_desc: >
      In a cluster of servers, each machine needs to know which other machines
      are currently alive and reachable. uKharon is a membership service that
      delivers this information in microseconds, enabling ultra-low-latency
      distributed applications to react instantly to node failures or joins.
    tech_desc: >
      uKharon is a RDMA-based membership service that maintains a consistent
      view of active cluster members with sub-microsecond failure detection
      using RDMA one-sided operations and hardware timestamps. It separates the
      liveness oracle from the application data plane, allowing membership
      changes to be disseminated without entering the critical path of
      microsecond-scale request processing.
    code:
      type: Lab GitHub
      url: https://github.com/LPD-EPFL/ukharon-artifacts
      date_last_commit: 2022-07-11
    license: other
    tags:
      - Concurrency
      - Network
    type: Simulation
    language: C
    information:
      - type: Paper
        title: "uKharon: A Membership Service for Microsecond Applications"
        url: https://www.usenix.org/conference/atc22/presentation/guerraoui
        notes:
          - label: Published at
            text: ATC 2022
            url: https://www.usenix.org/conference/atc22
    date_added: 2022-07-04
    date_updated: 2024-03-22
