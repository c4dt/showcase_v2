      - Infra
    description: Microsecond-scale BFT using Disaggregated Memory
    layman_desc: >
      Byzantine fault tolerance (BFT) makes distributed systems secure even when
      some machines behave maliciously, but traditionally it has been too slow
      for real-time applications. uBFT achieves BFT consensus in microseconds by
      exploiting fast, disaggregated memory hardware, making secure distributed
      systems practical for latency-critical workloads.
    tech_desc: >
      uBFT is a BFT state-machine replication protocol that achieves
      microsecond-scale latency by offloading agreement state to disaggregated
      RDMA memory accessible to all replicas. By replacing message-passing
      rounds with direct RDMA reads and writes, it reduces the critical-path
      latency of BFT consensus to under ten microseconds while maintaining
      standard safety and liveness guarantees under f Byzantine faults out of
      3f+1 replicas.
    code:
      type: Lab GitHub
      url: https://github.com/LPD-EPFL/ubft
      date_last_commit: 2023-03-14
    license: CC BY 4.0
    tags:
      - Byzantine Resilience
      - Network
      - Consensus
      - Protocol
    type: Library
    language: C
    information:
      - type: Paper
        title: "uBFT: Microsecond-scale BFT using Disaggregated Memory"
        url: https://arxiv.org/abs/2210.17174v3
        notes:
          - label: Published at
            text: ASPLOS 2023
            url: https://dl.acm.org/doi/proceedings/10.1145/3575693
    date_added: 2023-03-13
    date_updated: 2024-03-22

  byzfl:
    name: ByzFL
    description: >
      Python library for Byzantine-resilient federated learning, compatible with
      PyTorch and NumPy.
    type: Library
    categories:
      - Learning
      - Security
    applications:
      - Infra
    tags:
      - Byzantine Resilience
      - Federated Learning
      - Distributed Learning
      - Machine Learning
    layman_desc: >
      ByzFL helps train machine learning models across many participants even
      when some of them behave maliciously or are corrupted. It provides
      ready-to-use tools to simulate attacks and defences, so researchers can
      benchmark how robust their federated learning system really is.
    tech_desc: >
      ByzFL implements state-of-the-art robust aggregators (Trimmed Mean,
      Geometric Median, Krum, Centered Clipping, etc.) and pre-aggregators (NNM,
      Bucketing, ARC) as well as Byzantine attack strategies (IPM, ALIE, Sign
      Flipping, Mimic, …) fully compatible with PyTorch tensors and NumPy
      arrays. It also ships a complete federated learning simulation pipeline
      for systematic benchmarking under adversarial conditions.
    url: https://byzfl.epfl.ch/
    code:
      type: Lab GitHub
      url: https://github.com/LPD-EPFL/byzfl
      date_last_commit: 2025-07-22
    language: Python
    license: MIT
    date_added: 2026-03-19
    doc: https://byzfl.epfl.ch/
    information:
      - type: Paper
        title: "ByzFL: Research Framework for Robust Federated Learning"
        url: https://arxiv.org/abs/2505.24802
    date_updated: 2026-03-19

  anyway:
    name: Anyway
    description: >
      Self-hosted AI platform for private, on-premise LLM inference
    type: Application
    categories:
