  clht:
    name: CLHT
    categories:
      - Other
    applications:
      - Info
    description: Very fast and scalable, resizable hash table
    layman_desc: >
      CLHT contains both a lock-based and lock-free implementation of hash
      tables. Its optimistic design allows for 50 MegaOP/s in a concurrent run.
    tech_desc: >
      CLHT (Cache-Line Hash Table) is a highly optimised concurrent hash table
      in C whose buckets are aligned to single cache lines, eliminating false
      sharing. It provides both a lock-based variant with fine-grained
      per-bucket locking and a lock-free variant using hardware transactional
      memory, and supports online resizing while sustaining throughput above 50
      million operations per second on commodity multi-core hardware.
    url: https://lpd.epfl.ch/site/ascylib
    code:
      type: Lab GitHub
      url: https://github.com/LPD-EPFL/CLHT
      date_last_commit: 2021-10-04
    license: MIT
    tags:
      - Concurrency
      - Data Structures
    type: Library
    language: C
    information:
