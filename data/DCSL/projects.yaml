projects:
  gotee:
    name: Gotee
    categories:
      - Security
    applications:
      - Infra
    type: Library
    description:
      GoLang extension to allow a programmer to execute a goroutine within an
      enclave
    layman_desc: >
      Modern processors can create secure "enclaves" — isolated regions of
      memory that protect sensitive code and data even from the operating system
      itself. Gotee makes it easy for Go programmers to run parts of their
      program inside such an enclave, without needing to completely rewrite
      their application or understand the low-level hardware details.
    tech_desc: >
      Trusted Execution Environments (TEEs), such as Intel SGX enclaves, use
      hardware to ensure the confidentiality and integrity of operations on
      sensitive data. While the technology is available on many processors, the
      complexity of its programming model and its performance overhead have
      limited adoption. TEEs provide a new and valuable hardware functionality
      that has no obvious analogue in programming languages, which means that
      developers must manually partition their application into trusted and
      untrusted components. Gotee extends the Go language to allow a programmer
      to execute a goroutine within an enclave, to use low-overhead channels to
      communicate between the trusted and untrusted environments, and to rely on
      a compiler to automatically extract the secure code and data.
    code:
      type: Lab GitHub
      url: https://github.com/epfl-dcsl/gotee
      date_last_commit: 2020-09-07
    language: GoLang
    license: BSD-3-Clause
    tags:
      - Protection
      - Development
    maturity: 1
    information:
      - type: Paper
        title:
          "Secured Routines: Language-based Construction of Trusted Execution
          Environments"
        url: https://infoscience.epfl.ch/record/268171
        notes:
          - label: Published at
            text: USENIX ATC 2019
            url: https://www.usenix.org/conference/atc19
    date_added: 2021-11-04
    date_updated: 2024-02-20
  raft:
    name: Raft consensus protocol
    categories:
      - Blockchain
    applications:
      - Infra
    description: Implementation of the Raft consensus protocol
    tech_desc: >
      This is a C implementation of the Raft distributed consensus protocol that
      deliberately makes no assumptions about the underlying network, so it can
      operate over unreliable transports such as UDP. The library exposes a
      state-machine interface for log replication and leader election, allowing
      integrators to plug in their own network and storage layers.
    layman_desc: >
      Implementation of the Raft consensus protocol. The library doesn't assume
      a network layer with ordering or duplicate detection. This means you could
      use UDP for transmission.
    code:
      type: Lab GitHub
      url: https://github.com/epfl-dcsl/raft
      date_last_commit: 2020-03-25
    language: C
    license: BSD-3-Clause
    type: Library
    tags:
      - Consensus
      - Decentralized
      - Protocol
    date_added: 2021-11-05
    date_updated: 2024-02-20
  hovercraft:
    name: HovercRaft
    categories:
      - Other
    applications:
      - Infra
    type: Experiments
    description: Improved scalable and fault-tolerant distributed architecture
    layman_desc: >
      Cloud services need to handle more users as traffic grows and keep working
      even when hardware fails. HovercRaft is a new design for replicated
      services that achieves both goals simultaneously: adding more servers
      increases both the speed and the resilience of the system, instead of
      forcing a trade-off between the two.
    tech_desc: >
      Cloud platform services must simultaneously be scalable, meet low tail
      latency service-level objectives, and be resilient to a combination of
      software, hardware, and network failures. Replication plays a fundamental
      role in meeting both the scalability and the fault-tolerance requirement,
      but is subject to opposing requirements: (1) scalability is
      typicallyachieved by relaxing consistency; (2) fault-tolerance is
      typically achieved through the consistent replication of state machines.
      Adding nodes to a system can therefore either increase performance at the
      expense of consistency, or increase resiliency at the expense of
      performance. We propose HovercRaft, a new approach by which adding nodes
      increases both the resilience and the performance of general-purpose
      state-machine replication.
    code:
      type: Lab GitHub
      url: https://github.com/epfl-dcsl/hovercraft
      date_last_commit: 2020-03-29
    language: C, Python
    tags:
      - Consensus
      - Byzantine Resilience
      - Protocol
    information:
      - type: Paper
        title:
          "HovercRaft: Achieving Scalability and Fault-tolerance for
          microsecond-scale Datacenter Services"
        url: https://infoscience.epfl.ch/record/276586
        notes:
          - label: Published at
            text: EuroSys 2020
            url: https://www.eurosys2020.org/
    date_added: 2021-11-05
    date_updated: 2024-02-20
  crab:
    name: CRAB
    categories:
      - Other
    applications:
      - Infra
    type: Experiments
    description: L4 load balancer for cloud provider
    layman_desc: >
      When many users connect to a cloud service, a load balancer distributes
      their connections across multiple servers. CRAB is a new approach that
      lets servers handle connections directly after an initial redirect,
      bypassing the load balancer for subsequent packets and reducing latency
      without sacrificing connection tracking.
    tech_desc: >
      Connection Redirect LoAd Balancer is a new scheme for L4 load balancing
      targeting specifically internal cloud workloads.
    code:
      type: Lab GitHub
      url: https://github.com/epfl-dcsl/crab
      date_last_commit: 2021-09-10
    language: C
    tags:
      - Cloud
      - Network
    information:
      - type: Paper
        title: Bypassing the load balancer without regrets
        url: https://dl.acm.org/doi/10.1145/3419111.3421304
        notes:
          - label: Published at
            text: SoCC 2020
            url: https://acmsocc.github.io/2020/
    date_added: 2022-07-04
    date_updated: 2024-02-20
  fold:
    name: Fold
    description:
      "Rust framework for building dynamic linkers with syscall filtering and
      function hooks."
    layman_desc: >
      Dynamic linkers are system software that load and connect program
      components at runtime. Fold is a Rust framework that lets developers build
      custom dynamic linkers with fine-grained control, enabling things like
      intercepting system calls or injecting invisible function hooks between
      modules. This is useful for building security monitors, debugging tools,
      or specialized runtime environments.
    tech_desc: >
      Rust framework for constructing custom dynamic linkers with syscall
      filtering, inter-module communication, and invisible function-hook
      injection. Includes quick-start guide, required toolchain, VSCode
      configuration, and example projects demonstrating core capabilities.
    type: Framework
    categories:
      - Other
    tags:
      - Low-Level
    code:
      type: Lab Github
      url: https://github.com/epfl-dcsl/fold
      date_last_commit: 2026-04-02
    language: Rust
    license: MIT
    date_added: 2026-03-03
    showcase_interest:
      carine: 2
    applications:
      - Infra
  nwsim:
    name: nwsim
    description:
      "Network simulation suite integrating ns-2 with pFabric, SIRD, DCTCP, and
      Homa."
    layman_desc: >
      Understanding how data center networks behave under heavy load requires
      detailed simulations. nwsim integrates several network protocols and
      congestion control algorithms into the ns-2 simulator, letting researchers
      compare their performance under incast and random traffic patterns. It
      also supports OMNET integration and includes tools for analyzing queue
      occupancy and application performance metrics.
    tech_desc: >
      ns-2 simulation suite extended with pFabric, SIRD, DCTCP, and Homa
      transport protocols, plus OMNET integration. Provides configuration
      scripts for incast and random traffic experiments and output processing
      tools for queue occupancy and application metrics.
    type: Simulation
    categories:
      - Other
    tags:
      - Network
      - Simulator
    code:
      type: Lab Github
      url: https://github.com/epfl-dcsl/SIRD-Simulator
      date_last_commit: 2026-03-18
    language: C++
    date_added: 2026-03-03
    showcase_interest:
      carine: 4
    applications:
      - Infra
  miralis:
    name: Miralis
    description:
      "Virtual firmware monitor for RISC-V with formal verification via Kani."
    layman_desc: >
      Firmware is the low-level software that initializes hardware before the
      operating system starts. Miralis adds a security layer below the firmware
      on RISC-V processors, controlling and isolating it from the hardware so
      that untrusted or legacy firmware can run safely. The system has been
      formally verified using the Kani model checker, providing machine-checked
      guarantees about its correctness.
    tech_desc: >
      Virtual firmware monitor for RISC-V running below M-mode firmware,
      providing isolation and policy enforcement via sandbox and Keystone
      policies. Includes a Rust RISC-V ISA translator, benchmark scripts, and
      formal verification via Kani. Supports Docker and manual setup. SOSP'25
      artifact.
    type: Application
    categories:
      - Security
      - Verification
    tags:
      - Low-Level
      - RISC-V
      - Formal Methods
    code:
      type: Lab Github
      url: https://github.com/epfl-dcsl/miralis-sosp25-artifact
      date_last_commit: 2025-08-10
    language: Rust
    date_added: 2026-03-03
    showcase_interest:
      carine: 4
    applications:
      - Infra
