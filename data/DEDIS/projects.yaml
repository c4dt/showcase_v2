  drand:
    name: DRand
    logo: /products/images/drand/drand.png
    categories:
      - Security
    applications:
      - Infra
    description: Publicly verifiable randomness
    layman_desc: >
      In many distributed applications, it is important to get a provably secure
      random number. DRand makes it possible to have these numbers provably
      secure.
    tech_desc: >
      DRand produces publicly verifiable, unbiasable, and unpredictable random
      beacons using threshold BLS signatures over pairing-friendly elliptic
      curves. A network of independent nodes (League of Entropy) runs a
      distributed key generation (DKG) protocol and then periodically produces
      randomness that any third party can verify against the group public key.
