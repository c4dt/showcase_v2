  odyssey:
    name: Odyssey
    logo: /products/images/odyssey/odyssey.png
    categories:
      - Blockchain
      - Privacy
    applications:
      - Info
    description:
      Auditable Sharing and Management of Sensitive Data Across Jurisdictions
    layman_desc: >
      Odyssey lets organizations share sensitive data across borders and between
      parties that do not fully trust each other, while keeping a tamper-proof
      audit trail of every access. It combines blockchain technology with secure
      hardware enclaves so that data owners stay in control of who sees their
      information and when.
    tech_desc: >
      Odyssey is a set of applications and tools that enables sharing of
      sensitive data between multiple distrustful parties. This project uses
      state-of-the-art secret management service on the blockchain coupled with
      an enclave delivery mechanism.
    url: https://dedis.github.io/odyssey/
