    description: >
      SimNet is a tool to simulate decentralized applications in the cloud
    layman_desc: >
      Testing a decentralized application across many servers is expensive and
      complex. SimNet lets developers simulate entire networks of nodes in the
      cloud, introducing artificial delays and packet loss to see how their
      application behaves under realistic or adverse network conditions.
    tech_desc: >
      SimNet provides multiple configurations to affect the topology so that
      specific link between two nodes can have a delay or a loss of packets for
      instance.
    tags:
      - Simulator
    type: Application
    code:
