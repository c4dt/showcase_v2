    date_updated: "2026-04-02"

  gd-pure:
    name: Grounded Arithmetic
    description:
      "Prototype of Grounded Arithmetic logic formalized in Isabelle/Pure."
    layman_desc: >
      Grounded Arithmetic is a new approach to formalizing the foundations of
      mathematics that avoids paradoxes arising in traditional set theory. This
      project implements a complete formalization in Isabelle/Pure, a computer
      proof assistant, covering basic arithmetic, data structures like lists,
      and the full axiomatic system. It was developed as a bachelor's thesis.
    tech_desc: >
      Isabelle/Pure prototype of the Grounded Arithmetic (GA) logic system.
      Features a complete axiomatization, arithmetic functions, Cantor tuple
      constructions, a manually encoded List datatype, and the accompanying
      B.Sc. thesis PDF and source files.
    type: Experiments
    categories:
      - Verification
    tags:
