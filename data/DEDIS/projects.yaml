projects:
  proof-of-personhood:
    name: Proof-of-Personhood
    categories:
      - Privacy
    applications:
      - Info
      - Gov
    description:
      Proof that you are an actual person while keeping your anonymity
    layman_desc: >
      The internet allows for anonymous participation. While this is great for
      protecting people like whistleblowers, it can be a burden if people abuse
      it and create many fake accounts. This project implements a way to prove
      that you are a unique individual, while still guaranteeing you anonymity
      while you use services on the internet. Applications range from chat to
      e-voting and energy-efficient blockchains.
    tech_desc: >
      Fake accounts are a big problem on the internet, while not all people want
      or can identify themselves using state-issued identities.
      Proof-of-personhood proposes to use personhood parties where people have
      to physically show up and get identified as real persons. Using
      cryptographic primitives, it is then possible to prove that you were part
      of that group, without revealing your individual identity.
    tags:
      - Anonymity
    type: Application
    code:
      type: Lab Github
      url: https://github.com/dedis/popstellar
      date_last_commit: 2024-06-30
    language: Go, Java, Scala, JavaScript
    license: AGPL-3.0
    date_added: 2021-04-13
    date_updated: 2024-03-20
  dela:
    name: DEDIS Ledger Architecture
    logo: /products/images/dela/infograph.png
    categories:
      - Blockchain
    applications:
      - Infra
    description:
      Modular abstractions to perform Distributed Ledger (DL) operations
    layman_desc: >
      Dela is a modular toolkit for building and experimenting with distributed
      ledgers and blockchains. It lets researchers and developers plug in their
      own components — such as consensus algorithms or smart contract engines —
      without having to rebuild the entire system from scratch.
    tech_desc: >
      With Dela you can: learn the architecture of a distributed ledger, run
      your blockchain / distributed ledger, implement and test your new idea
      that will revolutionize the blockchain world by adding your new module’s
      implementation to the Dela ecosystem.
    url: https://dedis.github.io/dela/
    tags:
