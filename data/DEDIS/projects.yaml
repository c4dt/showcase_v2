  quepaxa:
    name: QuePaxa
    categories:
      - Blockchain
    applications:
      - Infra
    description: >
      Asynchronous consensus algorithm that escapes the tyranny of timeouts
    layman_desc: >
      Most distributed systems rely on timeouts to detect failures, which makes
      them vulnerable to network slowdowns and attacks. QuePaxa is a consensus
      algorithm that works correctly even when the network is slow or under
      attack, replacing fixed timeouts with adaptive "hedging-delay" techniques.
      This makes it significantly more robust and performant in practice,
      especially against network attacks and periods of asynchrony.
    tech_desc: >
      QuePaxa is a crash fault-tolerant asynchronous consensus algorithm that
      improves upon Multi-Paxos, Raft, Rabia, and EPaxos. Its three main
      innovations are: an asynchronous consensus core with a one-round-trip fast
      path, hedging-delay instead of traditional timeouts, and dynamic runtime
      protocol tuning. The implementation is written in Go and includes
      integration tests and AWS deployment scripts for artifact evaluation
      against competing consensus algorithms.
    tags:
      - Byzantine Resilience
      - Consensus
      - Network
      - Protocol
    type: Library
    code:
      type: Lab GitHub
      url: https://github.com/dedis/quepaxa
      date_last_commit: 2024-08-29
    information:
      - type: Paper
        title: "QuePaxa: Escaping the tyranny of timeouts in consensus"
        url: https://dl.acm.org/doi/10.1145/3600006.3613150
        notes:
          - label: Published at
            text: ACM SOSP 2023
            url: https://dl.acm.org/doi/proceedings/10.1145/3600006
    language: Go
    license: BSD-3-Clause
    maturity: 2
