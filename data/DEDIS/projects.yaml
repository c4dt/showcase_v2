  omniledger:
    name: OmniLedger
    categories:
      - Blockchain
    applications:
      - Infra
    description: Ethereum-like blockchain implementation based on skipchains
    layman_desc: >
      OmniLedger is a high performance blockchain solution developed by the
      DEDIS-lab. It supports pre-compiled smart contracts, as well as Ethereum
      smart contracts. Combined with Calypso, it allows management of access to
      secure and private data in a fully audited way.
    tech_desc: >
      OmniLedger is a ByzCoin-based blockchain that achieves high throughput via
      UTXO sharding and collective signing (CoSi) for block finality. It uses
      skipchains for efficient client-side verification of the chain, and
      exposes a smart-contract model (DARC) that supports both native Go
      contracts and EVM-compatible Ethereum contracts.
    code:
