  purbs:
    name: PURBs
    categories:
      - Privacy
    applications:
      - Info
    description:
      Metadata leakage prevention for encrypted communication and storage
    layman_desc: >
      A library for a novel encoding approach preventing metadata leakage for
      encrypted communication and data at rest.
    tech_desc: >
      PURBs (Padded Uniform Random Blobs) encode encrypted messages so that
      ciphertexts reveal no metadata — such as the number or type of recipients
      — to passive observers. The encoding uses Elligator-based public keys
      embedded at uniformly random positions, and pads ciphertexts to a size
      drawn from a geometric distribution to hide payload length.
    code:
      type: Lab GitHub
      url: http://github.com/dedis/purbs
      date_last_commit: 2020-01-13
    tags:
      - Encryption
    information:
      - type: Paper
        title:
          Reducing Metadata Leakage from Encrypted Files and Communication with
          PURBs
        url: https://infoscience.epfl.ch/record/271943
        notes:
          - label: Published at
            text: PETS 2019
            url: https://petsymposium.org/2019/program.php
    type: Library
    license: BSD-3-Clause
    date_added: 2019-03-18
    date_updated: 2024-03-20
  threshold-logical-clocks:
    name: Threshold Logical Clocks
    categories:
      - Blockchain
    applications:
      - Infra
    description:
      Solving the consensus problem in a new way by creating a global clock
    layman_desc: >
      Getting many computers to agree on a single version of events is a hard
      problem, especially when messages can arrive out of order. This project
      introduces "threshold logical clocks" — a way to give distributed systems
      a shared sense of time — so that reaching agreement becomes simpler and
      more robust than traditional approaches like Paxos.
    tech_desc: >
      An attempt to simplify asynchronous consensus by building atop a novel
      threshold logical clock abstraction, which enables upper layers to operate
      as if on a synchronous network. This approach yields an asynchronous
      consensus protocol for fail-stop nodes that may be simpler and more robust
      than Paxos and its leader-based variants, requiring no common coins and
      achieving consensus in a constant expected number of rounds.
    code:
      type: Lab GitHub
      url: https://github.com/dedis/tlc
      date_last_commit: 2023-04-21
    tags:
      - Byzantine Resilience
      - Consensus
    information:
      - type: Paper
        title:
          Threshold Logical Clocks for Asynchronous Distributed Coordination and
          Consensus
        url: https://arxiv.org/abs/1907.07010
      - type: Paper
        title:
          "Que Sera Consensus: Simple Asynchronous Agreement with Private Coins
          and Threshold Logical Clocks"
        url: https://arxiv.org/abs/2003.02291
      - type: Presentation
        title:
          "Que Sera: Simpler Asynchronous Consensus with Threshold Logical
          Clocks"
        url: https://drive.google.com/file/d/1BrTz20CbvXyFEKDtWH48FdWgwoG37wmr/view
    type: Application
    date_added: 2019-07-26
    date_updated: 2024-03-20
  twins:
