  limix:
    name: Limix
    categories:
      - Privacy
    applications:
      - Infra
    description: >
      Geo-distributed database with overlapping jurisdictional zone isolation
    layman_desc: >
      Limix is a research prototype for a database that respects geographic or
      jurisdictional boundaries. Data stored in different regions — Europe,
      Asia, or globally — can each follow their own rules and remain available
      even when parts of the network fail, because each region runs its own
      independent database instance. The system is evaluated on simulated and
      real-world network topologies to measure fault tolerance and performance.
    tech_desc: >
      Limix is a geo-distributed database built on CockroachDB, organized into
      overlapping jurisdictional zones. Each physical node can run multiple
      CockroachDB instances — one per zone it belongs to. Coordination uses
      DEDIS onet v2 for intra-zone membership dissemination and simnet for
      container orchestration. Clients perform strongly-consistent per-key reads
      and writes across relevant zones. Experiments evaluate partition tolerance
      and latency on random synthetic, CAIDA Ark, and real AWS topologies.
    tags:
      - Decentralized
      - Network
    type: Experiments
    code:
      type: Lab Github
      url: https://github.com/dedis/limix
      date_last_commit: 2022-04-20
    language: Go
    information:
      - type: Paper
        title:
          "Limix: Limiting Lamport Exposure to Distant Failures in
          Globally-Managed Distributed Systems"
        url: https://bford.info/pub/net/limix-full/
