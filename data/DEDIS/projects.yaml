  calypso:
    name: Calypso
    categories:
      - Blockchain
      - Privacy
    applications:
      - Info
    description: Encrypted storage with access control
    layman_desc: >
      Store data encrypted on the blockchain and use a decentralized access
      control mechanism to define who is allowed to decrypt. It has been
      developed alongside with OmniLedger. But it can also be used independently
      of OmniLedger.
    tech_desc: >
      Calypso implements on-chain secrets management using a distributed key
      generation protocol (DKG) combined with threshold decryption, so that
      decryption keys are never held by a single node. Access policies are
      expressed as Distributed Access Right Controls (DARC) stored on the
      OmniLedger blockchain, providing a fully auditable and decentralized
      enforcement mechanism.
    code:
      type: Lab GitHub
      url: https://github.com/dedis/cothority/tree/main/calypso
      date_last_commit: 2022-06-29
    incubator:
