    date_updated: 2024-03-20
  hbt:
    name: HBT
    categories:
      - Blockchain
    applications:
      - Gov
    description: Token for conflicts zone
    layman_desc: >
      HBT is a blockchain-based token system designed for use in conflict zones,
      where traditional banking infrastructure may be unavailable or
      untrustworthy. It enables anonymous, verifiable value transfer so that aid
      organizations, civilians, or displaced people can transact without relying
      on a central authority.
    tech_desc: >
      HBT implements an anonymous token system on a distributed ledger targeting
      high-risk, low-connectivity environments. It uses cryptographic anonymity
      techniques to ensure transaction unlinkability while maintaining
      auditability for authorized parties, and is designed to operate over
      intermittently connected networks.
    url: https://dedis.github.io/hbt
    tags:
      - Anonymity
      - Decentralized
    type: Application
    code:
      type: Lab Github
      url: https://github.com/dedis/hbt
      date_last_commit: 2024-05-07
    language: Go
    license: other
    date_added: 2022-07-04
    date_updated: 2024-03-20
  determ-checker:
    name: determ-checker
    categories:
      - Verification
    applications:
      - Info
    description: Find non-determinism in golang code
    layman_desc: >
      Distributed systems must produce the same result every time given the same
      inputs, but subtle programming bugs can make them behave unpredictably.
      This tool automatically scans Go source code to find such
      non-deterministic patterns before they cause hard-to-reproduce failures in
      production.
    tech_desc: >
      determ-checker is a static analysis tool for Go programs that detects
      sources of non-determinism such as map iteration order, goroutine
      scheduling races, and randomized data structure traversal. It is
      particularly relevant for consensus and blockchain code where
      non-deterministic execution can cause protocol forks.
    tags:
      - Code Analysis
    type: Toolset
    code:
      type: Lab Github
      url: https://github.com/dedis/determ-checker
      date_last_commit: 2022-10-14
    language: Go
    license: other
    date_added: 2022-07-04
    date_updated: 2024-03-20

  matchertext:
    name: matchertext
    categories:
      - Other
    applications:
      - Other
    description: >
      Matchertext is a syntactic discipline that allows strings in one compliant
      language to be embedded verbatim without escaping (e.g., via
      cut-and-paste) into itself or another compliant language.
    layman_desc: >
      Embedding code written in one programming language inside another (for
      example, SQL inside Python, or HTML inside JavaScript) usually requires
      tedious and error-prone escaping of special characters. Matchertext is a
      design rule for programming languages that eliminates this problem,
      letting you paste text from one language directly into another without any
      modification.
    tech_desc: >
      Matchertext defines a syntactic invariant requiring that all bracket-like
      characters (parentheses, brackets, braces) are balanced within any
      well-formed string in a compliant language. This property enables
      verbatim, zero-escaping embedding of matchertext-compliant strings across
      language boundaries, eliminating injection vulnerabilities and parser
      ambiguity that arise from ad-hoc escaping conventions.
    tags:
      - Code Analysis
    type: Toolset
    code:
      type: Lab Github
      url: https://github.com/dedis/matchertext
      date_last_commit: 2026-03-27
    information:
      - type: Paper
        title: "Matchertext: Towards Verbatim Interlanguage Embedding"
        url: https://arxiv.org/abs/2212.14129
      - type: Blog post
        title: "Matchertext: an escape route from language-embedding hell?"
        url: https://bford.info/2023/01/02/matchertext/
    language: Go
    license: other
    date_added: 2022-03-16
    date_updated: 2024-03-20

  apir:
    name: APIR
    categories:
      - Privacy
    applications:
      - Info
    description: >
      Authenticated Private Information Retrieval
    layman_desc: >
      This work introduces protocols for authenticated private information
      retrieval,  which enable a client to fetch a record from a database server
      such that (a) the server does  not learn which record the client reads,
      and (b) the client either obtains the "authentic"  record or detects
      server misbehavior and safely aborts.
    tech_desc: >
      APIR extends classical Private Information Retrieval (PIR) with
      cryptographic authentication guarantees. It provides both single-server
      and multi-server protocols, combining homomorphic-encryption-based PIR
      queries with Merkle-tree commitments or linear sketch-based MACs so that a
      client can detect a dishonest server while revealing nothing about the
      queried index.
    tags:
      - Anonymity
      - Access Control
    type: Library
    code:
      type: Lab GitHub
      url: https://github.com/dedis/apir-code
      date_last_commit: 2024-10-19
    information:
      - type: Paper
        title: "Authenticated private information retrieval"
        url: https://eprint.iacr.org/2023/297
        notes:
          - label: Published at
            text: "USENIX Security Symposium 2023"
            url: https://www.usenix.org/conference/usenixsecurity23/presentation/colombo
      - type: Demo
        title: "Keyd: A privacy-preserving key-value store"
        url: https://keyd.org/
    language: Go
    license: GPL-3.0
    maturity: 2
    date_added: 2023-07-05
    date_updated: 2024-03-20

  dvoting:
    name: d-voting
    description: >
      A decentralized, fully anonymous voting system for EPFL-internal
      elections.
    categories:
      - "Blockchain"
    applications:
      - "Gov"
    type: Application
    layman_desc: >
      The d-voting project allows for electronic voting without a central point
      of trust. It relies instead on the majority of servers to be honest during
      the voting process. The ballots are encrypted during the voting phase, and
      then shuffled to anonymise the results. When they are finally decrypted,
      it is not possible anymore to retrace who voted for what.
    tech_desc: >
      D-Voting is built on the Dela distributed ledger and uses a threshold
      ElGamal encryption scheme for ballot confidentiality combined with Neff
      shuffles for anonymization. Decryption is performed collectively by a set
      of servers using distributed key generation (DKG), ensuring that no single
      server can decrypt or de-anonymize ballots on its own.
    tags:
      - Anonymity
      - Byzantine Resilience
      - Decentralized
    url: https://dedis.github.io/d-voting/#/
    code:
      type: C4DT Github
      url: https://github.com/c4dt/d-voting
      date_last_commit: 2026-03-26
    incubator:
      type: incubated_market
      work: 2023/Q3-2024/Q2 Debugging and feature enhancement
      products:
        - type: App
          title: D-Voting application
          url: https://github.com/c4dt/d-voting
        - type: Blog
          title: Introducing d-voting
          url: https://c4dt.epfl.ch/article/introducing-d-voting/
        - type: Blog
          title:
            "Secure, Transparent, and Verifiable Elections: The D-Voting Project"
          url: https://c4dt.epfl.ch/article/secure-transparent-and-verifiable-elections-the-d-voting-project/
    language: Golang
    maturity: 1
    date_added: 2023-09-01
    date_updated: 2024-11-21
  votegral:
    name: Votegral
    description:
      "End-to-end verifiable, coercion-resistant voting system using TRIP for
      in-person registration."
    layman_desc: >
      Electronic voting must be both verifiable (you can check your vote was
      counted correctly) and coercion-resistant (nobody can force you to vote a
      particular way or prove how you voted). Votegral achieves both properties
      using TRIP, a protocol for in-person registration that separates identity
      verification from vote casting. It includes a simulation framework for
      performance testing and evaluation.
    tech_desc: >
      End-to-end verifiable, coercion-resistant voting system using TRIP for
      in-person registration. Implements E2E verification and coercion
      resistance via randomized ballot shuffling and re-encryption. Includes
      simulation framework, Docker/local build, configurable hardware and
      shuffle modes, and performance metrics generation.
    type: Application
    categories:
      - Privacy
      - Security
    applications:
      - Gov
    tags:
      - Protocol
      - 2026 Proposal
    code:
      type: Lab Github
      url: https://github.com/dedis/votegral
