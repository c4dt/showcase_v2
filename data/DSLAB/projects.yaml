projects:
  bolt:
    name: BOLT
    categories:
      - Verification
    applications:
      - Infra
    description: Performance contracts for software network functions
    layman_desc: >
      Software network functions (NFs), or middleboxes, promise flexibility and
      easy deployment of network services but face the serious challenge of
      unexpected performance behaviour. This behaviour makes it harder for
      network operators to provision their networks and exposes a new attack
      surface for adversaries seeking to degrade network performance. The goal
      of our work is to provide network operators and NF developers with
      comprehensive understanding of the NF's entire performance profile, before
      it is deployed. Such understanding would, for instance, allow operators to
      conduct precise capacity planning and developers to make informed
      development decisions.
    tech_desc: >
      We propose the notion of performance contracts for NFs. A performance
      contract enables users to predict and scrutinize NF performance at fine
      granularities without having to run them. It provider users with an
      abstraction that enables them to easily parameterize arbitrary input
      workloads, whether typical, exceptional or adversarial. Given only this
      abstract description of the workload and not a concrete instance, the
      contract predicts the performance of the NF without actually running it.
      The performance predictions are in terms of human-readable formulae,
      expressed as a function of workload and environment variables, that we
      together call Performance Critical Variables (PCVs). informed development
      decisions.
    url: https://bolt-perf-contracts.github.io/
    tags:
      - Network
    type: Application
    code:
      type: Project GitHub
      url: https://github.com/bolt-perf-contracts/bolt
      date_last_commit: 2019-08-05
    language: C
    information:
      - type: Paper
        title: Performance Contracts for Software Network Functions
        url: https://dslab.epfl.ch/pubs/bolt.pdf
        notes:
          - label: Published at
            text: "USENIX NSDI '19"
            url: https://www.usenix.org/conference/nsdi19/presentation/iyer
    date_added: 2021-02-03
    date_updated: 2022-07-05

  pix:
    name: PIX
    categories:
      - Verification
    applications:
      - Infra
    description:
      Automatic extraction of performance interfaces for network functions
    layman_desc: >
      Just as documentation describes what software does, PIX automatically
      produces a "performance interface" that describes how fast a network
      function runs and under what conditions. Network operators can use these
      interfaces to predict behaviour, catch performance regressions, and
      diagnose bottlenecks — without having to read the source code or run
      exhaustive benchmarks.
    tech_desc: >
      PIX automatically extracts performance interfaces from network function
      (NF) implementations. A performance interface characterises an NF's
      throughput and latency as a function of workload and environment
      variables, giving a compact and accurate summary of its performance
      profile. Evaluated on 12 network functions, PIX produces interfaces that
      are accurate yet far simpler than the source code, and extracts them in
      minutes. Practical applications include detecting performance regressions,
      diagnosing performance bugs, and measuring the latency impact of NIC
      offloads.
    code:
      type: Lab GitHub
      url: https://github.com/dslab-epfl/pix
      date_last_commit: 2022-07-14
    language: C
    license: MIT
    type: Toolset
    tags:
      - Code Analysis
      - Network
      - Low-Level
    information:
      - type: Paper
        title: Performance Interfaces for Network Functions
        url: https://infoscience.epfl.ch/record/294787
        notes:
          - label: Published in
            text: NSDI 2022
            url: https://www.usenix.org/conference/nsdi22/presentation/iyer
    date_added: 2022-07-05
    date_updated: 2023-03-20

  ebpf-se:
    name: eBPF-SE
    description: >
      eBPF symbolic execution tool
    type: "Application"
    categories:
      - "Security"
    applications:
      - "Infra"
    tags:
      - "Code Analysis"
      - "Debug"
      - "Network"
    layman_desc: >
      eBPF-SE is a tool that analyzes programs written for the Linux kernel's
      eBPF framework. It systematically explores all possible execution paths
      through the program by using symbolic values instead of concrete inputs.
      This allows finding bugs or verifying properties of the program. eBPF-SE
      uses models of the Linux APIs to avoid getting bogged down in the real
      kernel code. It was originally part of a tool for optimizing network
      software performance.
    tech_desc: >
      eBPF-SE is a tool that symbolically executes eBPF programs written for the
      Linux kernel. It is based on the KLEE symbolic execution engine and uses
      models (stubs) for the Linux kernel's libbpf API. This allows exploring
      all program paths without path explosion from the real API implementation.
      eBPF-SE was previously part of PIX, a tool that extracts performance
      interfaces from network function code.
    code:
      type: Lab Github
      url: https://github.com/dslab-epfl/ebpf-se
      date_last_commit: 2024-03-05
    language: C
    license: MIT
    date_added: 2024-03-20

  nex:
    name: NEX
    description:
      "Full-stack simulation framework running unmodified software while
      modelling hardware accelerators."
    layman_desc: >
      Developing software for hardware accelerators (specialized chips for tasks
      like AI inference or image processing) normally requires either actual
      hardware or very slow simulators. NEX runs real, unmodified software on
      regular CPUs while simultaneously simulating the accelerators, giving both
      speed and accuracy. It supports multiple accelerators and models
      interconnect and DMA latency realistically.
    tech_desc: >
      Full-stack simulation framework running unmodified software stacks on real
      CPUs while modeling hardware accelerators (VTA, JPEG, Protoacc) via RTL
      simulation or DSim. Supports multi-accelerator setups, DMA and
      interconnect latency modeling, and epoch-based scheduling. Integrates with
      the SimBricks modular simulation platform.
    type: Simulation
    categories:
      - Other
    tags:
      - Simulator
    code:
      type: Lab Github
      url: https://github.com/dslab-epfl/NEX
      date_last_commit: 2025-08-25
    language: C++
    license: MIT
    date_added: 2026-03-03
    showcase_interest:
      carine: 4
    applications:
      - Infra

  tpot:
    name: TPOT
    description: >
      Practical verification of system-software components written in standard C
    layman_desc: >
      Writing correct low-level system software (like drivers or OS components)
      is notoriously difficult. TPOT allows developers to formally verify these
      components without having to rewrite them in a special language — standard
      C code can be verified as-is.
    tech_desc: >
      Artifact repository for the paper "Practical Verification of
      System-Software Components Written in Standard C" (SOSP '24). Provides
      tools and methodology for verifying system-software components written in
      standard C.
    type: Application
    categories:
      - Verification
    applications:
      - Infra
    tags:
      - Code Analysis
      - Low-Level
    code:
      type: Lab Github
      url: https://github.com/dslab-epfl/tpot
      date_last_commit: 2024-08-21
    language: C
    information:
      - type: Paper
        title:
          "Practical Verification of System-Software Components Written in
          Standard C"
        url: https://dslab.epfl.ch/pubs/tpot.pdf
        notes:
          - label: Published in
            text: "SOSP '24"
    date_added: 2026-04-02
