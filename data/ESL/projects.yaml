projects:
  gem5-x:
    name: gem5-X
    categories:
      - Other
    applications:
      - Infra
    description: gem5-based simulator with architectural extensions
    layman_desc: >
      gem5-X stands for a gem5-based full-system simulator with architectural
      eXtensions. It is a gem5-based simulator that allows architectural
      exploration and optimization of heterogeneous systems
    tech_desc: >
      gem5-X extends the gem5 full-system simulator with architectural
      eXtensions targeting heterogeneous many-core platforms, including custom
      memory hierarchies, power models, and hardware accelerator integration. It
      enables design-space exploration and optimization of HPC and embedded
      systems at the microarchitectural level using C++ and Python.
    url: https://ecocloud.epfl.ch/research/sustainable-it-infrastructure/gem5-x/
    doc: https://www.epfl.ch/labs/esl/wp-content/uploads/2021/08/gem5_X_TechnicalManual_v2.pdf
    code:
      type: Lab GitHub
      url: https://github.com/esl-epfl/gem5-X
      date_last_commit: 2023-05-22
    language: C++, Python
    type: Framework
    tags:
      - Simulator
    information:
      - type: Paper
        title:
          "Gem5-X: A Many-Core Heterogeneous Simulation Platform for
          Architectural Exploration and Optimization"
        url: https://infoscience.epfl.ch/record/285129
      - type: Paper
        title:
          "Gem5-X: A Gem5-Based System Level Simulation Framework to Optimize
          Many-Core Platforms"
        url: https://infoscience.epfl.ch/record/264182
        notes:
          - label: Published at
            text: HPC 2019
            url: https://hosting.cs.vt.edu/hpc2019/
    date_added: 2021-11-04
    date_updated: 2022-07-05
  3d-ice:
    name: 3D-ICE
    categories:
      - Other
    applications:
      - Infra
    description: Thermal simulator for stacked integrated circuits
    layman_desc: >
      Hardware is getting smaller every day, components are being stacked on top
      of each other, in order to make theses more compact. But as it is getting
      smaller, it's also getting hotter. 3D-ICE helps in modelling how thermal
      flux are behaving.
    tech_desc: >
      3D-ICE is a compact transient thermal simulator for 3D stacked integrated
      circuits with inter-tier liquid cooling. It models heat dissipation using
      an equivalent resistor-capacitor network and solves the resulting system
      of differential equations to predict temperature distributions across
      stacked dies, supporting both linear and nonlinear thermal models with
      pluggable heat sink configurations.
    url: https://www.epfl.ch/labs/esl/research/open-source-software-projects/3d-ice/
    doc: https://eslweb.epfl.ch/3Dice/3D-ICE-User_Guide.pdf
    code:
      type: Lab GitHub
      url: https://github.com/esl-epfl/3d-ice
      date_last_commit: 2025-12-01
    language: C
    type: Simulation
    tags:
      - Low-Level
      - Simulator
    information:
      - type: Paper
        title:
          "3D-ICE 3.0: efficient nonlinear MPSoC thermal simulation with
          pluggable heat sink models"
        url: https://infoscience.epfl.ch/record/285104
      - type: Paper
        title:
          "3D-ICE: a compact thermal model for early-stage design of
          liquid-cooled ICs"
        url: https://infoscience.epfl.ch/record/186785
      - type: Paper
        title:
          "3D-ICE: Fast compact transient thermal modeling for 3D-ICs with
          inter-tier liquid cooling"
        url: https://infoscience.epfl.ch/record/149790
        notes:
          - label: Published at
            text: ICCAD 2010
            url: https://iccad.com
      - type: Paper
        title:
          Compact transient thermal model for 3D ICs with liquid cooling via
          enhanced heat transfer cavity geometries
        url: https://infoscience.epfl.ch/record/149792
        notes:
          - label: Published at
            text: THERMINIC 2010
            url: https://therminic.org/therminic2010/
    date_added: 2022-07-05
    date_updated: 2022-07-05

  cloud-performance-monitor:
    name: cloud-performance-monitor
    description: >
      Monitoring and improving performance of cloud services
    tech_desc: >
      The project on machine learning for HPC servers and data centers at
      the  ESL lab focuses on utilizing machine learning-based approaches
      for  multi-objective resource management. This research line aims to
      enhance the efficiency of heterogeneous High Performance Computing (HPC)
      servers and data centers by employing system-level resource management
      techniques.
    layman_desc: >
      In simpler terms, this project explores how to make
      high-performance  computing servers and data centers smarter using machine
      learning.  By applying advanced algorithms, the team aims to optimize the
      use of  resources in these environments efficiently. Ultimately, the goal
      is to  improve the performance and reliability of these systems while
      ensuring  they operate in a cost-effective and sustainable manner,
      contributing to  advancements in cloud infrastructure management and data
      center operations.
    type: Application
    categories:
      - Security
    applications:
      - Infra
    tags:
      - Benchmark
      - Cloud
      - Optimization
    url: https://www.epfl.ch/labs/esl/research/cloud-infrastructure/machine-learning-for-hpc-servers-and-data-centers/
    date_added: 2024-02-20

  digital-twins:
    name: digital-twins
    description: >
      Virtual copies for real-time connections
    type: Application
    categories:
      - Security
    applications:
      - Health
    tags:
      - Anonymity
      - Predictor
      - Medical
    date_added: 2024-02-20
    layman_desc: >
      Digital Twins are like virtual doppelgangers of physical objects,  helping
      in predicting diseases, evaluating climate policies, and  conserving
      resources.  EPFL's DIGIPREDICT project used digital twins to anticipate
      how COVID-19  might progress in individuals, aiding in better healthcare
      decisions.
    tech_desc: >
      Digital Twins involve creating virtual copies of real objects
      for  real-time monitoring and analysis. These replicas are utilized in
      various  fields like disease prediction, climate policy assessment, and
      resource  conservation.  EPFL's DIGIPREDICT consortium used digital twins
      to forecast  COVID-19 progression in patients.
    url: https://www.epfl.ch/labs/esl/research/digital-twins/

  hdtorch:
    name: hdtorch
    description: >
      PyTorch-based hyperdimensional computing library
    tech_desc: >
      HDTorch is a PyTorch-based library designed for
      hyperdimensional  computing, featuring custom CUDA extensions to
      accelerate hypervector operations. It is utilized for analyzing HDC
      benchmark datasets, focusing  on accuracy, runtime, and memory usage. The
      workflow involves initializing  basis vectors, encoding features, and
      aggregating vectors of the same  class.
    layman_desc: >
      HDTorch is a specialized library that uses PyTorch for
      advanced  hyperdimensional computing tasks. It helps researchers analyze
      complex  datasets efficiently, ensuring accuracy and optimizing resource
      usage. In simpler terms, it's like a powerful tool that assists in
      handling data securely and effectively for projects related to privacy and
      digital  trust.
    type: "Library"
    categories:
      - Learning
    applications:
      - Info
    tags:
      - Optimization
      - TensorFlow
      - Machine Learning
    code:
      type: Lab Github
      url: https://c4science.ch/source/hdtorch/
      date_last_commit: 2023-10-18
    language: Python
    license: MIT
    date_added: 2024-02-20

  x-heep:
    name: x-heep
    description: >
      Open-source RISC-V system-on-chip for healthcare monitoring
    tech_desc: >
      The X-HEEP project is an open-source RISC-V microcontroller designed for
      continuous  healthcare monitoring. It provides a customizable
      microcontroller unit (MCU)  composed of an open-source, industrial-grade
      RISC-V CPU, common peripherals,  and memories, which users can extend with
      their own accelerators. The project  targets both FPGA and ASIC
      implementations, with support for Xilinx-based  FPGAs.
    layman_desc: >
      X-HEEP is a project that aims to improve healthcare monitoring by
      creating  a new type of computer chip that can be customized by users.
      This chip can  be used in small devices for personal health monitoring or
      in larger systems  for more demanding applications. The project is
      open-source, meaning anyone  can use, modify, and distribute it, which
      could lead to widespread adoption  and innovation in the field of
      healthcare technology.
    type: Toolset
    categories:
      - Security
    applications:
      - Health
    tags:
      - Development
      - Internet of Things
      - Medical
    url: https://www.epfl.ch/labs/esl/research/systems-on-chip/x-heep/
    code:
      type: Lab Github
      url: https://github.com/esl-epfl/x-heep
      date_last_commit: 2026-04-01
    language: C
    license: SOLDERPAD HARDWARE LICENSE, Apache-2.0
    date_added: 2024-02-20
  gsr-monitor:
    name: GSR Monitor Board
    description:
      "Hardware validation board for HEEPidermis SoC with low-noise power
      regulation and GSR measurement."
    layman_desc: >
      This repository contains the hardware design and documentation for a
      circuit board that validates the HEEPidermis chip, a custom research chip
      for measuring galvanic skin response (GSR) on wearable devices. The board
      includes specialized low-noise analog circuitry and communicates with
      standard microcontrollers via I²C. It demonstrates the HEEPidermis SoC's
      capabilities in a real hardware setup.
    tech_desc: >
      Hardware validation board for the HEEPidermis SoC. Features low-noise
      power regulation, 16-bit current DAC (40 nA–10 µA), precision resistors,
      level-crossing and 12-bit ΣΔ ADCs, I²C interface (1.65–5.5 V), and Arduino
      library support. Includes schematics and WEMAC dataset integration.
    type: Experiments
    categories:
      - Other
    applications:
      - Health
    tags:
      - Hardware
      - Wearable
      - Internet of Things
    code:
      type: Lab Github
      url: https://github.com/esl-epfl/GSR_monitor
      date_last_commit: 2025-02-26
    language: HTML
    date_added: 2026-03-03
    showcase_interest:
      carine: 2
  prau:
    name: PRAU
    description:
      "Open-source configurable Posit arithmetic unit supporting extended
      numerical operations."
    layman_desc: >
      Posit numbers are a modern alternative to standard floating-point numbers
      that offer better numerical precision and fewer edge cases. PRAU is an
      open-source hardware implementation of posit arithmetic operations —
      addition, multiplication, division, and square root — that can be
      configured for different posit sizes and integrated into RISC-V
      processors. It originated from the PERCIVAL research project.
    tech_desc: >
      Open-source configurable hardware Posit Arithmetic Unit supporting posit
      sizes from 8–64 bits. Implements standard posit operations plus optional
      log-approximate multiplication, division, sqrt, and quire (exact
      accumulation). Derived from the PAU in the PERCIVAL RISC-V core; used by
      Coprosit and PHEE projects.
    type: Library
    categories:
      - Other
    tags:
      - Hardware
      - RISC-V
      - Low-Level
    code:
      type: Lab Github
      url: https://github.com/esl-epfl/PRAU
      date_last_commit: 2025-01-31
    language: VHDL
    date_added: 2026-03-03
    showcase_interest:
      carine: 2
    applications:
      - Infra
  coprosit:
    name: Coprosit
    description:
      "Posit and quire arithmetic coprocessor compliant with the RISC-V
      eXtension interface."
    layman_desc: >
      RISC-V is an open-source processor architecture, and coprocessors extend
      it with specialized instructions. Coprosit adds posit arithmetic — an
      alternative to standard floating-point numbers — as a coprocessor to
      RISC-V chips using the standard CV-X-IF extension interface. This lets
      RISC-V software use posit arithmetic for applications like neural network
      inference on embedded devices.
    tech_desc: >
      Posit and quire arithmetic coprocessor compliant with the RISC-V CV-X-IF
      eXtension interface, wrapping the PRAU execution unit. Configurable posit
      sizes (8–64 bits) and optional operations (log-approximate multiply,
      divide, sqrt, quire). Integrated into X-HEEP and PHEE; accessible via make
      configuration flags.
    type: Library
    categories:
      - Other
    tags:
      - Hardware
      - RISC-V
      - Low-Level
    code:
      type: Lab Github
      url: https://github.com/esl-epfl/Coprosit
      date_last_commit: 2025-01-31
    language: SystemVerilog
    date_added: 2026-03-03
    showcase_interest:
      carine: 2
    applications:
      - Infra
  phee:
    name: PHEE
    description:
      "Posit-enabled X-HEEP RISC-V platform integrating the Coprosit arithmetic
      coprocessor."
    layman_desc: >
      X-HEEP is an open-source RISC-V microcontroller platform for research.
      PHEE extends it by adding the Coprosit posit arithmetic coprocessor,
      enabling the platform to execute posit arithmetic instructions natively in
      hardware. This lets researchers study the benefits of posit numbers on
      real RISC-V hardware and FPGA prototypes.
    tech_desc: >
      X-HEEP RISC-V SoC extended with the Coprosit posit coprocessor via
      CV-X-IF, targeting the cv32e40px CPU. Supports configurable posit sizes
      and quire operations. Provides QuestaSim simulation, PYNQ-Z2 FPGA
      synthesis, vendor update management, and test commands.
    type: Framework
    categories:
      - Other
    tags:
      - Hardware
      - RISC-V
      - Low-Level
    code:
      type: Lab Github
      url: https://github.com/esl-epfl/PHEE
      date_last_commit: 2026-03-09
    language: C
    date_added: 2026-03-03
    showcase_interest:
      carine: 2
    applications:
      - Infra
  compigra:
    name: Compigra
    description:
      "MLIR-based compilation tool transforming C/C++ code into CGRA assembly."
    layman_desc: >
      Coarse-Grained Reconfigurable Arrays (CGRAs) are hardware accelerators
      that can be reprogrammed to efficiently run specific computational
      patterns. Compigra is a compiler that automatically converts regular C/C++
      code into the specialized assembly needed to run on these accelerators. It
      uses MLIR, a modern compiler framework, and an optimization stage that
      finds the best hardware mapping.
    tech_desc: >
      MLIR-based compilation tool transforming C/C++ to CGRA assembly via custom
      IR dialects, front-end optimizations, and a back-end ILP mapper requiring
      Gurobi. Build with CMake; run via compigra-opt; results verifiable with
      CGRA-simulator or RTL tools.
    type: Toolset
    categories:
      - Other
    tags:
      - Compiler
      - Low-Level
    code:
      type: Lab Github
      url: https://github.com/esl-epfl/Compigra
      date_last_commit: 2025-11-03
    language: C++
    license: Apache-2.0
    date_added: 2026-03-03
    showcase_interest:
      carine: 2
    applications:
      - Infra
  heepstor:
    name: HEEPstor
    description:
      "Framework for deploying post-training quantized PyTorch models on X-HEEP
      RISC-V SoCs."
    layman_desc: >
      Running neural network models on tiny microcontrollers requires converting
      them into a quantized, hardware-friendly format. HEEPstor automates this
      for the X-HEEP RISC-V platform — taking a PyTorch model and handling
      quantization, code generation, and deployment to the microcontroller. It
      supports a configurable systolic array accelerator for efficient inference
      at the edge.
    tech_desc: >
      Open-hardware framework for post-training quantization and deployment of
      PyTorch models on X-HEEP RISC-V SoCs. Provides automated INT8/FP32 hybrid
      quantization, FPGA synthesis, a configurable systolic array, performance
      analysis, and debugging tools. Targets edge AI workloads.
    type: Framework
    categories:
      - Learning
    tags:
      - Hardware
      - RISC-V
      - PyTorch
      - Internet of Things
    code:
      type: Lab Github
      url: https://github.com/esl-epfl/HEEPstor
      date_last_commit: 2025-02-10
    language: C++
    date_added: 2026-03-03
    showcase_interest:
      carine: 4
    applications:
      - Infra
  xif-copro:
    name: CV-X-IF Coprocessor
    description:
      "Sample RISC-V coprocessor implementing a custom BITREV instruction via
      the CV-X-IF interface."
    layman_desc: >
      This is a sample implementation showing how to add a custom instruction to
      a RISC-V processor using the standard coprocessor extension interface
      (CV-X-IF). The example instruction (BITREV) reverses the bits in a number,
      which is useful for algorithms like FFT, cryptography, and
      error-correcting codes. It serves as a practical template for developers
      adding their own custom instructions to RISC-V chips.
    tech_desc: >
      Sample RISC-V coprocessor implementing the R-type BITREV instruction via
      the CV-X-IF interface for the cv32e40px core. Includes hardware decode and
      execute stages and a C usage example. Serves as a template for custom
      instruction extension development.
    type: Library
    categories:
      - Other
    tags:
      - Hardware
      - RISC-V
      - Low-Level
    code:
      type: Lab Github
      url: https://github.com/esl-epfl/xif_copro
      date_last_commit: 2025-02-27
    language: SystemVerilog
    date_added: 2026-03-03
    showcase_interest:
      carine: 2
    applications:
      - Infra
  cross-domain-saliency-maps:
    name: Timeseries Saliency Maps
    description:
      "Cross-domain saliency maps library for time-series model explanation in
      PyTorch and TensorFlow."
    layman_desc: >
      When AI models make predictions on time-series data — like medical sensor
      readings — it is important to understand which parts of the input most
      influenced the prediction. This library produces "saliency maps" for
      time-series models, highlighting important regions across time, frequency,
      and ICA domains. It works with both PyTorch and TensorFlow models without
      requiring any retraining.
    tech_desc: >
      Library implementing cross-domain saliency maps for time-series model
      explainability in PyTorch and TensorFlow. Supports time, frequency, and
      ICA domains via invertible differentiable transforms. Requires no model
      retraining; extensible to custom transforms. Pip-installable with
      ready-to-run notebooks.
    type: Library
    categories:
      - Learning
    applications:
      - Health
    tags:
      - Time Series
      - Wearable
      - PyTorch
      - TensorFlow
    code:
      type: Lab Github
      url: https://github.com/esl-epfl/cross-domain-saliency-maps
      date_last_commit: 2025-09-16
    language: Python
    license: GPL-3.0
    date_added: 2026-03-03
    showcase_interest:
      carine: 4
      linus: 3
  ticwatch-radar:
    name: Pedesite App
    description:
      "Wear OS application for wearable sensor data acquisition, storage, and
      automated upload."
    layman_desc: >
      Pedesite is a smartwatch application for Wear OS that continuously
      collects sensor data, stores it locally on the watch, and automatically
      uploads it to a data pipeline when the watch is charging. It supports
      multiple sensor types and includes Python tools for reading and
      visualizing the collected data. This is useful for health research studies
      requiring continuous wearable sensor recordings.
    tech_desc: >
      Wear OS application for continuous wearable sensor data acquisition, local
      storage, and automated batch upload to Kafka while charging. Includes ADB
      installation instructions, watch-face activation, Python scripts for
      sensor file reading, and data visualization tools.
    type: Application
    categories:
      - Other
    applications:
      - Health
    tags:
      - Wearable
      - Time Series
      - Mobile App
      - Internet of Things
    code:
      type: Lab Github
      url: https://github.com/esl-epfl/ticwatch-radar
      date_last_commit: 2025-05-16
    language: Kotlin
    date_added: 2026-03-03
    showcase_interest:
      carine: 3
  metawears:
    name: MetaWearS
    description:
      "Meta-learning framework for few-shot adaptation in wearable health
      monitoring."
    layman_desc: >
      Wearable health monitors need models that work well for individual users,
      but collecting labeled training data from each person is expensive.
      MetaWearS uses meta-learning — training models that can quickly adapt to
      new users with very little data — to create personalized health monitoring
      systems. It pre-trains on large datasets and fine-tunes with just a few
      labeled examples per user, while keeping updates lightweight to conserve
      battery.
    tech_desc: >
      Meta-learning framework for few-shot adaptation in wearable health
      monitoring. Pre-trains on large datasets with prototypical network
      structure; fine-tunes on few shots per user. Lightweight update mechanism
      conserves battery. Provides code, Jupyter notebooks, and hardware
      implementation details.
    type: Framework
    categories:
      - Learning
    applications:
      - Health
    tags:
      - Wearable
      - Time Series
      - Deep Neural Networks
      - Internet of Things
      - Medical
    code:
      type: Lab Github
      url: https://github.com/esl-epfl/metawears
      date_last_commit: 2026-01-10
    language: C++
    license: MIT
    date_added: 2026-03-03
    showcase_interest:
      carine: 4
  heepidermis:
    name: HEEPidermis
    description:
      "X-HEEP-based SoC for GSR and impedance recording with DMA and
      level-crossing support."
    layman_desc: >
      HEEPidermis is a custom research microchip designed for recording
      biological signals from the skin for health monitoring wearables. It
      measures galvanic skin response (GSR) and impedance using a current DAC
      and a specialized 14-bit analog-to-digital converter. Built on the
      open-source X-HEEP RISC-V platform, it can be programmed and simulated
      using standard research tools.
    tech_desc: >
      X-HEEP-based SoC for galvanic skin response (GSR) and impedance recording
      using an iDAC and 14-bit VCO-ADC. Supports DMA, digital Level-Crossing
      detection, and JTAG/SPI/UART interfaces. Board preparation, programming
      modes, and RTL simulation steps documented in the README.
    type: Experiments
    categories:
      - Other
    applications:
      - Health
    tags:
      - Hardware
      - RISC-V
      - Wearable
      - Low-Level
      - Internet of Things
      - Medical
    code:
      type: Lab Github
      url: https://github.com/esl-epfl/HEEPidermis
      date_last_commit: 2026-04-01
    language: SystemVerilog
    date_added: 2026-03-03
    showcase_interest:
      carine: 1
  heepidermis-breakout-board:
    name: HEEPidermis Breakout Board
    description:
      "Hardware breakout board for HEEPidermis with connector pinout
      documentation."
    layman_desc: >
      This repository contains hardware design documentation for a breakout
      board that makes it easier to connect the HEEPidermis chip to external
      components and test equipment. It provides connector pinout information
      and a hardware diagram, serving as a reference for engineers integrating
      the HEEPidermis SoC into their own designs.
    tech_desc: >
      Hardware breakout board for the HEEPidermis SoC providing accessible
      connector pinouts for integration and testing. Includes a connector pinout
      spreadsheet and diagram link for hardware engineers.
    type: Experiments
    categories:
      - Other
    tags:
      - Hardware
      - Wearable
    code:
      type: Lab Github
      url: https://github.com/esl-epfl/HEEPidermis-breakout-board
      date_last_commit: 2025-11-18
    date_added: 2026-03-03
    showcase_interest:
      carine: 1
    applications:
      - Health
  cheep-boards:
    name: CHEEP Boards
    description:
      "Modular PCB suite with configurable power supplies and current
      measurement modules."
    layman_desc: >
      CHEEP Boards are a modular set of circuit boards designed for flexible
      hardware prototyping in research settings. A main PCB provides basic
      connectivity, power regulation, and peripherals, while interchangeable
      "chewing-gum" modules can add configurable voltage supplies or current
      measurement capabilities. Researchers can also design their own custom
      modules to extend the platform.
    tech_desc: >
      Modular PCB suite with a main board (FTDI, power, peripherals) and 150-pin
      connector for custom breakout boards. Chewing-gum modules add configurable
      voltage supplies or current measurement. I²C multiplexers manage address
      conflicts. Open-source with extension APIs for custom module development.
    type: Experiments
    categories:
      - Other
    tags:
      - Hardware
    code:
      type: Lab Github
      url: https://github.com/esl-epfl/CHEEP-boards
      date_last_commit: 2026-01-30
    language: HTML
    date_added: 2026-03-03
    showcase_interest:
      carine: 1
    applications:
      - Infra
  aquacast:
    name: AquaCast
    description:
      "Transformer-based time-series forecasting framework for urban water
      dynamics."
    layman_desc: >
      Managing urban water systems — detecting leaks and optimizing distribution
      — requires accurate forecasting of how water flows through the network
      over time. AquaCast applies transformer neural networks — the same
      technology behind AI chatbots — to predict multiple aspects of urban water
      dynamics simultaneously. Synthetic datasets are provided since real
      operational data is confidential.
    tech_desc: >
      Research framework for multi-variate, multi-horizon time-series
      forecasting of urban water dynamics using transformer architectures.
      Includes synthetic datasets, Docker setup, and experiment scripts. Real
      operational data unavailable due to NDAs. References an arXiv preprint.
    type: Application
    categories:
      - Other
    applications:
      - Infra
    tags:
      - Time Series
      - Deep Neural Networks
      - Predictor
    code:
      type: Lab Github
      url: https://github.com/esl-epfl/AquaCast
      date_last_commit: 2026-03-11
    language: Python
    license: Apache-2.0
    date_added: 2026-03-03
    showcase_interest:
      carine: 2
