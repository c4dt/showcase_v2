  reflecta:
    name: Reflecta
    description:
      "Reflection-based, language-agnostic fuzzer for scripting languages."
    layman_desc: >
      Reflecta is a tool for finding bugs in scripting language interpreters
      (like Python, Ruby, or PHP) by automatically generating and running random
      programs in those languages. Unlike traditional fuzzers that produce
      random byte sequences, Reflecta uses the language's own reflection
      capabilities to generate syntactically and semantically valid programs. It
      has found numerous real bugs across multiple interpreters.
    tech_desc: >
      Language-agnostic fuzzer for scripting language interpreters leveraging
      reflection APIs to generate valid programs. Supports Ruby, MRuby, CPython,
      MicroPython, PHP, and V8. Dockerized with scripts for campaign launch,
      coverage collection, and result visualization. Compatible with reflecta,
      nautilus, and polyglot fuzzers.
    type: Application
    categories:
      - Security
    tags:
