  droidot:
    name: Droidot
    description: "Framework to fuzz Android app native libraries on arm64."
    layman_desc: >
      Mobile apps often include compiled C/C++ code — native libraries — that
      can contain hard-to-find security vulnerabilities. Droidot extracts these
      native libraries from Android apps and automatically tests them for bugs
      using fuzzing on arm64. It uses an emulated environment and automated
      harness generation to work without physical device access.
    tech_desc: >
      Fuzzing framework for Android app native libraries (arm64) using static
      analysis to extract function signatures and generate fuzzing harnesses.
      Workflow: Docker setup → APK loading → emulator setup → static analysis →
      harness generation → fuzzing → crash triage. Includes emulator, fuzzing,
      harness, and static analysis tooling.
