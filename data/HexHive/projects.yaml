  taemu:
    name: GP TA Emulator
    description:
      "GlobalPlatform Trusted Application emulator with GDB and fuzzing support."
    layman_desc: >
      Trusted Applications (TAs) are small secure programs running inside a TEE
      on mobile devices to protect sensitive operations like payments or key
      storage. taemu lets developers run and debug these applications on a
      standard computer without requiring real secure hardware, and also
      supports fuzzing them to find security vulnerabilities before deployment.
    tech_desc: >
      Emulator for GlobalPlatform-compliant Trusted Applications (TAs) enabling
      development, debugging (GDB support), and fuzzing without physical TEE
      hardware. Provides Docker setup, PoC build instructions, Android NDK
      cross-compilation, and fuzzing harness with crash handling and replay.
