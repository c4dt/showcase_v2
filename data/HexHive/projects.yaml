  midas:
    name: Midas
    categories:
      - Security
    applications:
      - Infra
    description: Systematic kernel TOCTTOU protection
    layman_desc: >
      A subtle class of security bugs called TOCTTOU
      (time-of-check-to-time-of-use) lets attackers trick the operating system
      kernel by changing data between when it is checked and when it is used.
      Midas prevents this by ensuring the kernel always reads the same value for
      a given memory address during a single system call.
    tech_desc: >
      During a syscall, the kernel might read multiple times a value from
      userspace. As theses are controlled by the unpriviliged process, it may
      introduce subtle changes of behavior and possible hard-to-detect attacks,
      a classic time-of-check-to-time-of-use bug. Midas disable this attack
      surface by always returning the same values during a given syscall.
    code:
      type: Lab GitHub
      url: https://github.com/HexHive/Midas
      date_last_commit: 2021-12-08
    language: C
    license: other
    type: Application
    tags:
      - Binary
      - Debug
      - Protection
    information:
      - type: Paper
        title: "Midas: Systematic Kernel TOCTTOU Protection"
        url: https://infoscience.epfl.ch/record/290014
        notes:
          - label: Published at
            text: "Usenix SEC '22"
            url: https://www.usenix.org/conference/usenixsecurity22/summer-accepted-papers
    date_added: 2022-09-27
    date_updated: 2024-04-12

  gleefuzz:
    name: GLeeFuzz
    categories:
      - Security
    applications:
      - Infra
    description: Fuzzing WebGL Through Error Message Guided Mutation
    layman_desc: >
      3D graphics in web browsers are powered by a complex API called WebGL that
      can contain serious security vulnerabilities. GLeeFuzz finds these
      vulnerabilities by using browser error messages as feedback to guide its
      testing, discovering flaws in Chrome, Firefox, and Safari.
    tech_desc: >
      Our fuzzing technique, GLeeFuzz, guides input mutation by error messages
      instead of code coverage. Our key observation is that browsers emit
      meaningful error messages to aid developers in debugging their WebGL
      programs. Error messages indicate which part of the input fails (e.g.,
      incomplete arguments, invalid arguments, or unsatisfied dependencies
      between API calls). Leveraging error messages as feedback, the fuzzer
      effectively expands coverage by focusing mutation on erroneous parts of
      the input. We analyze Chrome’s WebGL implementation to identify the
      dependencies between error-emitting statements and rejected parts of the
      input, and use this information to guide input mutation. We evaluate our
      GLeeFuzz prototype on Chrome, Firefox, and Safari on diverse desktop and
      mobile OSes. We discovered 7 vulnerabilities, 4 in Chrome, 2 in Safari,
      and 1 in Firefox. The Chrome vulnerabilities allow a remote attacker to
      freeze the GPU and possibly execute remote code at the browser privilege.
    tags:
      - Fuzzing
    type: Application
    code:
      type: Lab Github
      url: https://github.com/HexHive/GLeeFuzz
      date_last_commit: 2022-11-18
    information:
      - type: Paper
        title: "GLeeFuzz: Fuzzing WebGL Through Error Message Guided Mutation"
        url: https://www.usenix.org/system/files/sec23summer_249-peng-prepub.pdf
        notes:
          - label: Published at
            text: Usenix SEC '23
            url: https://www.usenix.org/conference/usenixsecurity23/summer-accepted-papers
    date_added: 2023-03-20
    date_updated: 2024-04-12

  evocatio:
    name: Evocatio
    categories:
      - Security
    applications:
      - Infra
    description:
      Evocatio is a bug analyzer built on top of AFL++ and AddressSanitizer. It
      automatically discovers a bug’s capabilities.
    layman_desc: >
      When a security bug is found in software, it is not always clear how
      dangerous it actually is. Evocatio automatically explores what an attacker
      could do with a bug by generating variants of the triggering input,
      revealing the full extent of the vulnerability’s exploitability.
    tech_desc: >
      Evocatio automatically discovers a bug’s capabilities: analyzing a
      crashing test case (i.e., an input exposing a bug) to understand the full
      extent of how an attacker can exploit a bug. Evocatio leverages a
      capability-guided fuzzer to efficiently uncover new bug capabilities
      (rather than only generating a single crashing test case for a given bug,
      as a traditional greybox fuzzer does).
    tags:
      - Fuzzing
    type: Application
    code:
      type: Lab Github
      url: https://github.com/HexHive/Evocatio
      date_last_commit: 2023-07-21
    information:
      - type: Paper
        title: "Evocatio: Conjuring Bug Capabilities from a Single PoC"
        url: https://hexhive.epfl.ch/publications/files/22CCS.pdf
    date_added: 2023-03-20
    date_updated: 2024-04-12
  warpattack:
    name: WarpAttack
    categories:
      - Security
    applications:
      - Infra
    description: Bypassing CFI through Compiler-Introduced Double-Fetches
    layman_desc: >
      Control-flow integrity is a widely used defense that prevents attackers
      from redirecting program execution. WarpAttack reveals a new way to bypass
      this defense by exploiting optimizations that compilers silently
      introduce, where the same memory value is read twice and can differ
      between reads.
    tech_desc: >
      WarpAttack is a new attack vector that exploits compiler-introduced
      double-fetch optimizations to mount TOCTTOU attacks and bypass code-reuse
      mitigations.
    tags:
      - Attack
    type: Application
    code:
      type: Lab Github
      url: https://github.com/HexHive/WarpAttack
      date_last_commit: 2023-04-13
    information:
      - type: Paper
        title:
          "WarpAttack: Bypassing CFI through Compiler-Introduced Double-Fetches"
        url: https://hexhive.epfl.ch/publications/files/23Oakland3.pdf
    date_added: 2023-04-24
    date_updated: 2024-04-12
  videzzo:
    name: ViDeZZo
    categories:
      - Security
    applications:
      - Infra
    description: Dependency-aware Virtual Device Fuzzing Framework
    layman_desc: >
      Virtual machines emulate hardware devices in software, and bugs in these
      virtual devices can let attackers escape the virtual machine and
      compromise the host. ViDeZZo automatically tests these virtual devices for
      vulnerabilities by generating test inputs that respect the dependencies
      between device messages.
    tech_desc: >
      ViDeZZo is a virtual device fuzzing framework considering both intra- and
      inter-message dependencies to balance fuzzing scalability and efficiency.
    tags:
      - Fuzzing
    type: Framework
    code:
      type: Lab Github
      url: https://github.com/HexHive/ViDeZZo
      date_last_commit: 2025-04-15
    information:
      - type: Paper
        title: "VIDEZZO: Dependency-aware Virtual Device Fuzzing"
        url: https://hexhive.epfl.ch/publications/files/23Oakland4.pdf
    date_added: 2023-04-24
    date_updated: 2024-04-12
  sievefuzz:
    name: SieveFuzz
    categories:
      - Security
    applications:
      - Infra
    description:
      Optimizing Directed Fuzzing via Target-tailored Program State Restriction
    layman_desc: >
      Directed fuzzing focuses testing resources on specific parts of a program
      known to be suspicious, but it often wastes effort on program states
      irrelevant to reaching the target. SieveFuzz improves efficiency by
      restricting the fuzzer to only explore program states that are on a path
      toward the target location.
    tech_desc: >
      We implement tripwiring-directed fuzzing as a prototype, Sieve-Fuzz, and
      evaluate it alongside the state-of-the-art directed fuzzers AFLGo, BEACON
      and the leading undirected fuzzer AFL++. Overall, across nine benchmarks,
      SieveFuzz’s tripwiring enables it to trigger bugs on an average 47% more
      consistently and 117% faster than AFLGo, BEACON and AFL++.
    tags:
      - Fuzzing
    type: Framework
    code:
      type: Lab Github
      url: https://github.com/HexHive/SieveFuzz
      date_last_commit: 2023-04-10
    information:
      - type: Paper
        title:
          "One Fuzz Doesn’t Fit All: Optimizing Directed Fuzzing via
          Target-tailored Program State Restriction"
        url: https://hexhive.epfl.ch/publications/files/22ACSAC2.pdf
    date_added: 2023-04-24
    date_updated: 2024-04-12
  mendelfuzz:
    name: MendelFuzz
    description:
      "Improved deterministic stage for AFL++ fuzzer, now default in AFL++
      4.10c."
    layman_desc: >
      Fuzzing is a security testing technique that automatically feeds inputs to
      a program to find crashes and bugs. MendelFuzz improves a key part of the
      AFL++ fuzzer called the "deterministic stage", which systematically
      mutates inputs rather than randomly. This improvement has proven so
      effective that it became the default behavior in AFL++ version 4.10c.
    tech_desc: >
      Enhanced deterministic mutation stage for AFL++ improving coverage and
      bug-finding over the standard havoc and deterministic strategies. Merged
      as the default stage in AFL++ 4.10c. Artifact includes reproducibility
      scripts for MAGMA and FuzzBench evaluations with documented data quirks.
    type: Application
    categories:
      - Security
    tags:
      - Fuzzing
    code:
      type: Lab Github
      url: https://github.com/HexHive/MendelFuzz-Artifact
