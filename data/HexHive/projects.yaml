  truman:
    name: Truman
    description:
      "Constructs device behavior models from OS drivers for virtual-device
      fuzzing."
    layman_desc: >
      Truman is a security research tool that learns how hardware devices behave
      by analyzing the software drivers that control them, then uses that
      knowledge to fuzz virtual (emulated) versions of those devices for
      vulnerabilities. It captures hidden dependencies between driver messages
      to generate more realistic and effective test inputs. The technique was
      published at NDSS 2025.
    tech_desc: >
      Framework for constructing device behavior models from OS device drivers,
      capturing inter- and intra-message dependencies. Generates
      dependency-aware seeds for virtual-device fuzzing via dynamic binary
      instrumentation (DBI). Docker-based build, fuzzing, and coverage
      collection pipelines provided.
