  sourcerer:
    name: Sourcerer
    description:
      "LLVM-based C++ type checking tool with performance overhead and fuzzing
      evaluation."
    layman_desc: >
      Type confusion bugs — where a program treats data as the wrong type — are
      a common source of security vulnerabilities in C++ software. Sourcerer is
      a compiler-based tool that adds runtime checks to detect dangerous type
      mismatches. It has been evaluated on performance overhead using
      industry-standard benchmarks and includes fuzzing experiments to measure
      its bug-finding effectiveness.
    tech_desc: >
      LLVM-based instrumentation tool enforcing C++ type safety at runtime to
      detect type confusion and memory safety violations. Artifact includes
      scripts for compatibility testing, SPEC CPU performance overhead
      measurement, ablation studies, and fuzzing evaluation. Docker-based setup
      with hardware/software requirements.
    type: Application
    categories:
      - Security
    tags:
      - Static Analysis
      - Robustness
