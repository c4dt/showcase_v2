  nass:
    name: NASS
    description:
      "Dynamic binary instrumentation tool for fuzzing Android native system
      services."
    layman_desc: >
      Android phones run many background services written in C/C++ that are
      difficult to test for security vulnerabilities. NASS uses dynamic binary
      instrumentation — a technique for analyzing programs as they run — to
      discover and fuzz these native services on real devices. It can
      automatically extract interfaces, generate test inputs, and triage
      crashes.
    tech_desc: >
      Dynamic binary instrumentation (DBI) framework for discovering and fuzzing
      Android native system services. Requires a rooted device with ADB and NDK
      r26. Provides scripts for interface extraction, seed generation, fuzzing
      campaigns, crash triage, and evaluation against COTS and FANS baselines.
      Docker setup available.
    type: Application
    categories:
      - Security
    tags:
      - Fuzzing
      - Binary
