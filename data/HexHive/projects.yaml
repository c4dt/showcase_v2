  beanpod-fiasco:
    name: Beanpod TEE Pwn
    description:
      "Proof-of-concept exploit for the keyinstall Trusted Application on Xiaomi
      Redmi Note 11s 5G."
    layman_desc: >
      This is a proof-of-concept security exploit demonstrating a vulnerability
      in the trusted execution environment (TEE) of Xiaomi Redmi Note 11s 5G
      phones. A TEE is a secure processor area meant to protect sensitive
      operations like key management. The exploit maps and reads secure monitor
      memory, showing that a root-level attacker can access protected TEE data.
    tech_desc: >
      PoC exploit targeting the keyinstall Trusted Application in the Beanpod
      TEE on Xiaomi Redmi Note 11s 5G. Demonstrates mapping of secure monitor
      memory via a vulnerability in the TA's key installation flow. Requires
      rooted device; provides kernel module and verification steps.
    type: Experiments
    categories:
