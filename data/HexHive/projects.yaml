  liberator:
    name: libErator
    description:
      "Automatically generates fuzzing drivers for libraries by extracting
      constraints."
    layman_desc: >
      Testing libraries for security vulnerabilities requires writing
      specialized "driver" programs that feed inputs to the library — a tedious
      and error-prone task. libErator automates this by analyzing a library's
      code to understand its constraints, then automatically synthesizing
      conforming test drivers. This lets security researchers fuzz libraries
      much faster and with less manual effort.
    tech_desc: >
      Framework for automated fuzzing driver synthesis for C/C++ libraries. Uses
      static analysis to extract API constraints and pre/post-conditions, then
      generates conforming drivers for libfuzzer. Includes a customized
      libfuzzer build and tooling to add new fuzzing targets and run
      experiments.
    type: Framework
    categories:
