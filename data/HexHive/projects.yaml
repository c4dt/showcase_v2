  orchard:
    name: Orchestrated Artifact Evaluation
    categories:
      - Security
    applications:
      - Infra
    type: Framework
    description: Automatically evaluating code artifacts from research papers
    layman_desc: >
      Research papers in computer science are increasingly expected to include
      working code, but verifying that this code actually works is a slow and
      tedious manual process. Orchard provides a standardized, automated way to
      run and evaluate these code artifacts using container technology.
    tech_desc: >
      While there has been a strong push for adding reliable code artifacts to
      research papers since 2018, the process of evaluating them is still manual
      and often very tedious. Orchard proposes a standardized framework based on
      Docker to automatically evaluate those artifacts.
