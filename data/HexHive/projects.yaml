  privacyshield:
    name: PrivacyShield
    description:
      "BLE beacon relay system to prevent unwanted AirTag tracking using ESP32
      relays."
    layman_desc: >
      AirTags and similar Bluetooth tracking devices can be misused to secretly
      follow people without their knowledge. PrivacyShield uses small wireless
      ESP32 microcontrollers to relay AirTag signals in a way that confuses the
      tracking system and prevents accurate location tracking. It includes a
      Flask server, a modified smartphone detection app, and open-source ESP32
      firmware.
    tech_desc: >
      System countering unsolicited BLE tracker-based surveillance by
      relay-confusing AirTag and similar devices. Architecture: Flask server,
      modified AirGuard Android app, ESP32 BLE relay firmware, and optional
      Sniffle-based sniffer tools. Fully open-source under GPLv3/MIT.
    type: Application
