  sysyphuzz:
    name: SYSYPHUZZ
    description:
      "Syzkaller-based kernel fuzzer targeting low-frequency code regions with
      coverage-guided scheduling."
    layman_desc: >
      Kernel fuzzers automatically find bugs in operating system code, but most
      only test code paths that are triggered frequently and easily. SYSYPHUZZ
      targets "low-frequency" code paths — rare but often bug-prone kernel
      regions — by intelligently scheduling which test cases receive more CPU
      time. It also uses a warm-up mode and basic-block hit counting to maximize
      coverage of hard-to-reach paths.
    tech_desc: >
      Kernel fuzzer extending Syzkaller with selective task scheduling to
      prioritize low-frequency basic blocks and context-preserving mutations.
      Introduces warm-up mode with basic-block hit-count tracking via kcov
      instrumentation. Achieves better coverage of rare but bug-prone kernel
      code paths.
    type: Application
    categories:
      - Security
    tags:
      - Fuzzing
