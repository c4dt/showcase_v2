projects:
  slico:
    name: SLICO Superpixels
    categories:
      - Other
    applications:
      - Info
    description: Efficient Superpixels
    layman_desc: >
      Superpixels, which define similar regions in an image, are becoming
      increasingly popular for use in computer vision applications. This
      research proposes a faster and more accurate way to get these pixels.
    tech_desc: >
      SLICO is a zero-parameter variant of the SLIC superpixel algorithm that
      adaptively normalizes gradient magnitudes across the image, producing
      compact superpixels of uniform size in both textured and texture-less
      regions. It runs efficiently in O(N) time and requires no manual tuning of
      the compactness parameter.
    url: https://www.epfl.ch/labs/ivrl/research/slic-superpixels/#SLICO
    code:
      type: Lab Download
      url: https://ivrl.epfl.ch/wp-content/uploads/2018/08/SLICSuperpixels_VC2008_SLICO_15Jun2013.zip
    tags:
      - Computer Vision
    language: C++
    type: Application
    date_added: 2019-03-18
    date_updated: 2024-04-14
  image-completion:
    name: Image Completion
    categories:
      - Other
    applications:
      - Info
    description: Complete an image whose 99% pixels are randomly missing
    layman_desc: >
      It is challenging to complete an image whose 99% pixels are randomly
      missing. We present a solution to this extreme image completion problem.
    tech_desc: >
      This work addresses extreme image completion where 99% of pixels are
      randomly absent. The method formulates the problem as low-rank matrix
      recovery, exploiting non-local self-similarity and sparsity priors to
      reconstruct plausible image content from the tiny fraction of observed
      pixels, outperforming prior inpainting approaches under this highly
      degraded setting.
    url: https://www.epfl.ch/labs/ivrl/research/image-completion/
    code:
      type: Lab Download
      url: https://www.epfl.ch/labs/ivrl/wp-content/uploads/2018/08/fan_icassp17.zip
    tags:
      - Computer Vision
    language: MATLAB
    type: Application
    date_added: 2019-03-18
    date_updated: 2024-04-14
  adefan:
    name: ADEFAN
    type: Application
    categories:
      - Other
    applications:
      - Info
    description: Fast and energy-efficient video encoder and decoder
    layman_desc: >
      Transmitting video from cameras or IoT devices consumes a lot of energy
      and processing power. ADEFAN is a new video compression technology that is
      extremely fast to encode and far more energy-efficient than existing
      methods, making it ideal for battery-powered surveillance and remote
      monitoring devices.
    tech_desc: >
      ADEFAN (Adaptive Depth Efficient Filtering by Adaptive Normaliztion) is a
      state-of-the-art technology for encoding and decoding videos that presents
      many advantages over other available methods. It features extremely
      energy-efficient encoder, extremely fast encoding process, no specialized
      hardware for encoding and added security with encoding key. It is this
      ideal for video-transmitting IoT devices, continuously transmitting
      surveillance cameras, emergency deployment in areas without much
      infrastructure (remote, natural disaster relief, etc.).
    url: https://adefan.epfl.ch/static/index.html
    code:
      type: Lab GitHub
      url: https://github.com/IVRL/ADEFAN
      date_last_commit: 2020-04-15
    language: Python
    license: MIT
    tags:
      - Computer Vision
      - Images
    information:
      - type: Paper
        title: Divergence-Based Adaptive Extreme Video Completion
        url: https://infoscience.epfl.ch/record/277003
        notes:
          - label: Published at
            text: ICASSP 2020
            url: https://2020.ieeeicassp.org/
    date_added: 2021-11-05
    date_updated: 2024-04-14
  fg-nic:
    name: FG-NIC
    type: Application
    categories:
      - Learning
    applications:
      - Info
    description: Noise-robust image classification
    layman_desc: >
      AI image recognition systems are typically trained on clean photos and
      perform poorly when images are blurry or noisy. FG-NIC improves the
      accuracy of existing AI classifiers on noisy images without needing to
      retrain them from scratch, by estimating how faithful a noisy image is to
      its clean version.
    tech_desc: >
      Image classification has significantly improved using deep learning. This
      is mainly due to convolutional neural networks (CNNs) that are capable of
      learning rich feature extractors from large datasets. However, most deep
      learning classification methods are trained on clean images and are not
      robust when handling noisy ones, even if a restoration preprocessing step
      is applied.  We propose a method that can be applied on a pretrained
      classifier.  We improve the noisy-image classification (NIC) results by
      significantly large margins, especially at high noise levels, and come
      close to the fully retrained approaches.
    code:
      type: Lab GitHub
      url: https://github.com/IVRL/FG-NIC
      date_last_commit: 2024-04-25
    language: Python
    license: MIT
    tags:
      - Images
      - Deep Neural Networks
      - Image Classification
    information:
      - type: Paper
        title:
          Fidelity Estimation Improves Noisy-Image Classification with
          Pretrained Networks
        url: https://infoscience.epfl.ch/record/287705
        notes:
          - label: Published in
            text: IEEE Signal Processing Letters 2021
            url: https://ieeexplore.ieee.org/document/9513558
    date_added: 2021-11-05
    date_updated: 2024-04-14
  buifd:
    name: BUIFD
    type: Application
    categories:
      - Learning
    applications:
      - Info
    description: Deep learning image denoiser
    layman_desc: >
      Removing random noise from photos is a common image processing task, but
      most tools require knowing how much noise is present. BUIFD is an AI
      denoiser that works without any knowledge of the noise level, producing
      high-quality results for both grayscale and color images automatically.
    tech_desc: >
      Blind and universal image denoising consists of using a unique model that
      denoises images with any level of noise. It is especially practical as
      noise levels do not need to be known when the model is developed or at
      test time. We propose a blind and universal deep learning image denoiser
      based on an optimal denoising solution, which we call fusion denoising.
      Our approach improves real-world grayscale additive image denoising. It
      also improves state-of-the-art color image denoising performance on every
      single noise level by an average of 0.1dB.
    code:
      type: Lab GitHub
      url: https://github.com/IVRL/BUIFD
      date_last_commit: 2020-11-24
    language: Python
    license: MIT
    tags:
      - Images
      - Deep Neural Networks
    information:
      - type: Paper
        title:
          Blind Universal Bayesian Image Denoising WithGaussian Noise Level
          Learning
        url: https://infoscience.epfl.ch/record/276107
        notes:
          - label: Published in
            text: IEEE Transactions on Image Processing, Vol. 29, 2020
            url: https://ieeexplore.ieee.org/document/9024220
    date_added: 2021-11-05
    date_updated: 2024-04-14
  zero-learning-medical-fusion:
    name: Zero-Learning Fast Medical Image Fusion
    type: Application
    categories:
      - Learning
    applications:
      - Info
      - Health
    description: High-quality image fusion
    layman_desc: >
      Medical imaging often combines information from multiple scan types, such
      as MRI and CT, to give doctors a complete picture. This tool fuses images
      from different medical scanners into a single high-quality image in real
      time, without requiring any additional training data.
    tech_desc: >
      Medical image fusion plays a central role by integrating information from
      multiple sources into a single, more understandable output. We propose a
      real-time image fusion method using pre-trained neural networks to
      generate a single image containing features from multi-modal sources. Our
      method can be applied to any number of input sources.
    code:
      type: Lab GitHub
      url: https://github.com/IVRL/Zero-Learning-Medical-Fusion
      date_last_commit: 2019-05-10
    language: Python
    tags:
      - Images
      - Deep Neural Networks
      - Medical
    information:
      - type: Paper
        title: Zero-Learning Fast Medical Image Fusion
        url: https://infoscience.epfl.ch/record/270048
        notes:
          - label: Published at
            text: FUSION 2019
            url: https://ieeexplore.ieee.org/document/9011178
    date_added: 2021-11-05
    date_updated: 2024-04-14
  lelsd:
    name: LELSD
    type: Application
    categories:
      - Learning
    applications:
      - Info
    description: Interactive GAN-based image editing
    layman_desc: >
      AI image generators can produce realistic pictures but sometimes include
      subtle visual errors that are obvious to people but not to the system.
      LELSD lets users point out these errors interactively, and the tool learns
      to correct them, producing more realistic generated images.
    tech_desc: >
      When generating an image using a GAN, some errors might appear which are
      obvious to the human observer, but not to the computer. By introducing
      this user feedback one can refine the generated image to look even more
      real.
    code:
      type: Lab GitHub
      url: https://github.com/IVRL/LELSD
      date_last_commit: 2024-05-31
    language: Python
    tags:
      - Images
      - Deep Neural Networks
    license: MIT
    information:
      - type: Paper
        title:
          Optimizing Latent Space Directions For GAN-based Local Image Editing
        url: https://arxiv.org/abs/2111.12583
    maturity: 1
    date_added: 2022-07-05
    date_updated: 2024-04-14
  dsr:
    name: DSR
    type: Experiments, Simulation
    categories:
      - Learning
    applications:
      - Info
    description: Drone Image Super-Resolution
    layman_desc: >
      Drones capture images from varying heights, which means the same scene can
      appear at very different resolutions. DSR is a new dataset and benchmark
      for testing AI systems that upscale low-resolution drone images, revealing
      that current approaches do not transfer well to aerial imagery.
    tech_desc: >
      Despite achieving remarkable progress in recent years, single-image
      super-resolution methods are developed with artificial limitations. We
      propose a novel drone image dataset, with scenes captured at low and high
      resolutions, and across a span of altitudes. Our results show that
      off-the-shelf state-of-the-art networks perform worse on this different
      domain.
    code:
      type: Lab GitHub
      url: https://github.com/IVRL/DSR
      date_last_commit: 2022-09-15
    language: Python
    tags:
      - Images
      - Deep Neural Networks
    information:
      - type: Paper
        title: "DSR: Towards Drone Image Super-Resolution"
        url: https://arxiv.org/abs/2208.12327
        notes:
          - label: Published at
            text: ECCV 2022 Workshops
            url: https://dl.acm.org/doi/proceedings/10.1007/978-3-031-25063-7
    license: BSD-3-Clause
    date_added: 2023-03-21
    date_updated: 2024-04-14
  tempsal:
    name: TempSAL
    type: Application, Experiments
    categories:
      - Learning
    applications:
      - Info
    description: Uncovering Temporal Information for Deep Saliency Prediction
    layman_desc: >
      When people look at an image, their eyes do not take in everything at once
      but scan across interesting areas in a particular order over time. TempSAL
      is an AI model that predicts not just where people will look in an image,
      but also in what sequence they will look at different areas.
    tech_desc: >
      Deep saliency prediction algorithms complement the object recognition
      features, they typically rely on additional information, such as scene
      context, semantic relationships, gaze direction, and object dissimilarity.
      However, none of these models consider the temporal nature of gaze shifts
      during image observation. We introduce a novel saliency prediction model
      that learns to output saliency maps in sequential time intervals by
      exploiting human temporal attention patterns.
    url: https://ivrl.github.io/Tempsal/#section-qualitative
    code:
      type: Lab GitHub
      url: https://github.com/IVRL/Tempsal
      date_last_commit: 2025-03-11
    tags:
      - Images
      - Deep Neural Networks
    information:
      - type: Paper
        title:
          "TempSAL -- Uncovering Temporal Information for Deep Saliency
          Prediction"
        url: https://arxiv.org/abs/2301.02315
    license: MIT
    date_added: 2023-03-21
    date_updated: 2024-04-14

  dynca:
    name: DyNCA
    categories:
      - Learning
    applications:
      - Info
    type: Framework
    description:
      Real-Time Dynamic Texture Synthesis Using Neural Cellular Automata
    layman_desc: >
      Generating realistic moving textures like flowing water, fire, or rustling
      leaves for video games or simulations normally requires slow, offline
      computation. DyNCA can synthesize these dynamic textures in real time and
      allows interactive control over the motion and appearance after training.
    tech_desc: >
      Current Dynamic Texture Synthesis (DyTS) models in the literature can
      synthesize realistic videos. However, these methods require a slow
      iterative optimization process to synthesize a single fixed-size short
      video, and they do not offer any post-training control over the synthesis
      process. We propose Dynamic Neural Cellular Automata (DyNCA), a framework
      for real-time and controllable dynamic texture synthesis.
    url: https://dynca.github.io/
    code:
      type: Lab GitHub
      url: https://github.com/IVRL/DyNCA
      date_last_commit: 2024-05-31
    tags:
      - Images
      - Deep Neural Networks
    information:
      - type: Paper
        title:
          "DyNCA: Real-time Dynamic Texture Synthesis Using Neural Cellular
          Automata"
        url: https://arxiv.org/abs/2211.11417
    license: MIT
    date_added: 2023-03-21
    date_updated: 2024-04-14
  noisediff:
    name: NoiseDiff
    description:
      "Dark Noise Diffusion for synthetic low-light noise generation and image
      denoising."
    layman_desc: >
      Photographs taken in low-light conditions are often degraded by camera
      sensor noise called "dark noise". NoiseDiff uses diffusion models — a type
      of AI image generation technology — to both simulate this noise
      realistically and remove it from images. This makes it possible to train
      better denoising algorithms even without large real-world noisy image
      datasets.
    tech_desc: >
      Dark Noise Diffusion model for synthetic low-light noise generation and
      paired image denoising. Trained on SID and ELD datasets; uses
      diffusion-based noise simulation to augment training data. Provides
      pretrained models, training/testing scripts, shading resources, and
      optional synthetic data generation pipeline.
    type: Application
    categories:
      - Other
    tags:
      - Images
      - Deep Neural Networks
    code:
      type: Lab Github
      url: https://github.com/IVRL/NoiseDiff
      date_last_commit: 2025-10-25
    language: Python
    license: Apache-2.0
    date_added: 2026-03-03
    showcase_interest:
      carine: 3
    applications:
      - Info
