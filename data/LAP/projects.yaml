projects:
  dynamatic:
    name: Dynamatic
    type: Toolset
    categories:
      - Other
    applications:
      - Info
    description: High-level synthesis compiler
    layman_desc: >
      Dynamatic translates ordinary C or C++ programs into digital hardware
      circuits that can run on FPGAs. Unlike traditional tools that follow a
      fixed schedule, it generates circuits that adapt their timing at runtime
      to get the best possible performance.
    tech_desc: >
      Dynamatic is an academic, open-source high-level synthesis compiler that
      produces synchronous dynamically-scheduled circuits from C/C++ code. It
      delivers significant performance improvements compared to state-of-the-art
      commercial tools in specific situations.
    url: https://dynamatic.epfl.ch/
    code:
      type: Lab GitHub
      url: https://github.com/EPFL-LAP/dynamatic
      date_last_commit: 2026-03-30
    language: C++
    license: MIT
    tags:
      - Low-Level
    information:
      - type: Paper
        title: Dynamically Scheduled High-level Synthesis
        url: https://www.epfl.ch/labs/lap/wp-content/uploads/2018/11/JosipovicFeb18_DynamicallyScheduledHighLevelSynthesis_FPGA18.pdf
        notes:
          - label: Published in
            text:
              Proceedings of the 2018 ACM/SIGDA International Symposium on FPGAs
            url: https://dl.acm.org/doi/proceedings/10.1145/3174243
      - type: Tutorial
        title: "Dynamatic: From C/C++ to Dynamically Scheduled Circuits"
        url: https://dynamatic.epfl.ch/papers/FPGA_20_Dynamatic_From_C_C_to_Dynamically_Scheduled_Circuits.pdf
        notes:
          - label: Published in
            text:
              Proceedings of the 2020 ACM/SIGDA International Symposium on FPGAs
            url: https://www.sigda.org/publications/fpga-2020-toc/
    date_added: 2021-11-04
    date_updated: 2024-03-22
  hardcilk:
    name: HardCilk
    type: Experiments
    categories:
      - Other
    applications:
      - Info
    description: Cilk-like task parallelism for FPGAs
    layman_desc: >
      Modern programs often split work into many small tasks that run in
      parallel. HardCilk brings this idea directly into hardware chips (FPGAs),
      so that parallel tasks can be created and managed by the chip itself
      rather than by software, making computation faster and more efficient.
    tech_desc: >
      HardCilk implements Cilk-style fork-join task parallelism directly in
      hardware for FPGAs, enabling dynamic task spawning and synchronization at
      the circuit level. It brings the expressive parallel programming model of
      Cilk to reconfigurable computing without a software runtime.
    code:
      type: Lab GitHub
      url: https://github.com/EPFL-LAP/HardCilk
      date_last_commit: 2026-03-12
    language: SystemVerilog
    license: GPL-3.0
    tags:
      - Hardware
      - Low-Level
      - Concurrency
    information:
      - type: Paper
        title: "HardCilk: Cilk-like Task Parallelism for FPGAs"
        url: https://www.epfl.ch/labs/lap/wp-content/uploads/2024/05/ShahawyMay24-HardCilk-Cilk-like-Task-Parallelism-for-FPGAs-FCCM.pdf
        notes:
          - label: Published at
            text: FCCM 2024
      - type: Video
        title: Conference presentation
        url: https://youtu.be/1EjEUD5sPpg
    date_added: 2026-04-02
  dynaburst:
    name: DynaBurst
    type: Application, Library
    categories:
      - Other
    applications:
      - Info
    description: Group DRAM bursts
    layman_desc: >
      Accessing memory in large, contiguous chunks is much faster than many
      small scattered reads. DynaBurst automatically groups many irregular
      memory requests from an FPGA accelerator into efficient bursts, greatly
      improving memory bandwidth utilization without changing the application.
    tech_desc: >
      DynaBurst is a highly flexible, FPGA-optimized, memory system for
      bandwidth-bound accelerators that perform frequent irregular accesses to
      DRAM memory. DynaBurst is an extension of the lab's miss-optimized
      nonblocking cache which groups incoming requests into bursts of memory
      requests.
    code:
      type: Lab GitHub
      url: https://github.com/EPFL-LAP/fpl19-DynaBurst
      date_last_commit: 2019-09-06
    language: VHDL
    license: MIT
    tags:
      - Low-Level
    information:
      - type: Paper
        title:
          "DynaBurst: Dynamically Assemblying DRAM Bursts over a Multitude of
          Random Accesses"
        url: https://infoscience.epfl.ch/record/276498
        notes:
          - label: Published at
            text: FPL 2019
            url: https://fpl2019.bsc.es
    date_added: 2022-07-05
    date_updated: 2024-03-22
