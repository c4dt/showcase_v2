projects:
  stainless:
    title: Stainless
    categories:
      - Verification
    applications:
      - Infra
    description:
      Verification framework for a subset of the Scala programming language
    layman_desc: >
      Stainless automatically checks that a Scala program is correct by
      mathematically proving it satisfies its stated properties for all possible
      inputs. If the program has a bug, Stainless finds a concrete example that
      triggers it.
    tech_desc: >
      Stainless is a tool for verifying Scala programs developed by the LARA. It
      can verify that your program is correct for all inputs, it can report
      inputs for which your program fails when they exist, and it can prove that
      functions do not loop.
    url: http://stainless.epfl.ch/
    code:
      type: Lab GitHub
      url: https://github.com/epfl-lara/stainless
      date_last_commit: 2026-04-14
    doc: https://epfl-lara.github.io/stainless/
    tags:
      - Static Analysis
      - Code Analysis
    language: Scala
    type: Library
    license: Apache-2.0
    information:
      - type: Paper
        title: "Satisfiability Modulo Recursive Programs"
        url: https://lara.epfl.ch/~kuncak/papers/SuterETAL11SatisfiabilityModuloRecursivePrograms.pdf
        notes:
          - label: Published at
            text: SAS 2011
            url: https://staticanalysis.org
      - type: Paper
        title:
          "On Counter-Example Complete Verification for Higher-Order Functions"
        url: https://infoscience.epfl.ch/record/207420
      - type: Paper
        title: "System FR as Foundations for Stainless"
        url: https://arxiv.org/pdf/1904.03482.pdf
        notes:
          - label: Published at
            text: OOPSLA 2019
            url: https://2019.splashcon.org/track/splash-2019-OOPSLA
      - type: Video
        title: Tools for Verified Scala at Scala Days 2017
        url: https://www.youtube.com/watch?v=d4VeFa0z_Lo
      - type: Video
        title:
          Formal verification of Scala programs with Stainless at Typelevel
          Summit 2019
        url: https://www.youtube.com/watch?v=K1ZwpumSHCc
      - type: Tutorial
        title: Stainless Verification System Tutorial
        url: https://raw.githubusercontent.com/epfl-lara/fmcad2021tutorial/main/Stainless-Tutorial-FMCAD2021.pdf
      - type: Webpage
        title: "Bolts: Stainless Verified Scala Examples"
        url: https://github.com/epfl-lara/bolts
    maturity: 2
    date_added: 2019-03-18
    date_updated: 2024-04-12
  stainless-for-smart-contracts:
    title: Stainless for smart contracts
    categories:
      - Verification
    applications:
      - Infra
    description: Stainless fork aimed at smart contracts
    layman_desc: >
      This project adapts the Stainless verification tool to formally check the
      correctness of blockchain smart contracts. It allows developers to prove
      that a smart contract behaves as intended before it is deployed,
      preventing costly bugs and exploits.
    tech_desc: >
      Stainless is a tool for verifying Scala programs developed by the LARA.
      This fork can perform verification of Smart Contracts.
    url: https://stainless.epfl.ch/smart-contracts.html
    code:
      type: Lab GitHub
      url: https://github.com/epfl-lara/smart
      date_last_commit: 2020-10-03
    tags:
      - Static Analysis
      - Code Analysis
    language: Scala
    type: Library, Application
    license: Apache-2.0
    incubator:
      type: retired_archived
      work: 2021/Q2 - updated demonstrator with more explanations
      products:
        - type: Demo
          title: Stainless-OmniLedger demonstrator
          url: https://github.com/c4dt/service-stainless
          code: https://github.com/c4dt/service-stainless
    date_added: 2022-09-26
    date_updated: 2024-04-12
    maturity: 2
  inox:
    title: Inox
    categories:
      - Verification
    applications:
      - Infra
    description: Constraint solver for Stainless
    layman_desc: >
      Inox is the underlying engine that powers the Stainless verifier. It takes
      logical constraints about a program and automatically determines whether
      they can be satisfied or proven impossible, delegating hard problems to
      state-of-the-art SMT solvers.
    tech_desc: >
      Inox can be used to prove constraints on methods in a program, to attest
      the correctness of these parts.
    code:
      type: Lab GitHub
      url: https://github.com/epfl-lara/inox
      date_last_commit: 2026-03-31
    tags:
      - Low-Level
    language: Scala
    type: Library, Application
    license: Apache-2.0
    notes: >
      Invokes https://github.com/Z3Prover/z3 and
      http://cvc4.cs.stanford.edu/web/
    date_added: 2019-03-18
    date_updated: 2024-04-12

  rust-stainless:
    title: Rust-Stainless
    categories:
      - Verification
    applications:
      - Infra
    description: Rust frontend for Stainless
    layman_desc: >
      Rust-Stainless brings formal verification to the Rust programming language
      by connecting Rust code to the Stainless verifier. Developers can annotate
      their Rust programs with specifications and have them automatically
      checked for correctness.
    tech_desc: >
      Rust-Stainless is a frontend that extracts a Stainless-compatible
      intermediate representation from Rust source code via the Rust compiler
      internals. It enables deductive verification of safe Rust programs by
      translating annotated functions into Stainless verification conditions and
      dispatching them to the underlying SMT-based solver.
    code:
      type: Lab GitHub
      url: https://github.com/epfl-lara/rust-stainless
      date_last_commit: 2021-07-22
    maturity: 1
    language: Rust
    type: Application
    license: Apache-2.0
    tags:
      - Static Analysis
      - Code Analysis
    date_added: 2021-11-04
    date_updated: 2024-04-12

  lisa:
    title: LISA
    categories:
      - Verification
    applications:
      - Info
    description:
      A Proof Assistant based on first order logic, sequent calculus and set
      theory.
    layman_desc: >
      LISA is a tool that helps mathematicians and computer scientists write and
      check formal mathematical proofs. It verifies every logical step in a
      proof automatically, ensuring that conclusions genuinely follow from
      stated axioms and hypotheses.
    tech_desc: >
      LISA is a proof assistant built on first-order logic and sequent calculus,
      with a foundational layer in axiomatic set theory. It provides a kernel
      that checks proof certificates for validity and a higher-level tactic
      language in Scala for constructing and automating proofs interactively.
    code:
      type: Lab GitHub
      url: https://github.com/epfl-lara/lisa
      date_last_commit: 2026-04-13
    language: Scala
    type: Framework, Application
    license: Apache-2.0
    tags:
      - Code Analysis
      - Development
    date_added: 2022-07-05
    date_updated: 2024-04-12

  scallion:
    title: Scallion
    categories:
      - Other
    applications:
      - Info
    description:
      A library for writing parsers and pretty printers for LL(1) languages in
      Scala.
    layman_desc: >
      Scallion is a Scala library that makes it easy to build tools that read
      and format programming languages or structured text. Developers describe
      the grammar of their language once, and Scallion generates both a parser
      and a pretty printer from that single definition.
    tech_desc: >
      Scallion is a combinator-based library for constructing LL(1) parsers and
      pretty printers in Scala, using a zipper-based parsing-with-derivatives
      algorithm for efficient and predictable parsing. A single grammar
      definition drives both directions, guaranteeing consistency between
      parsing and printing.
    code:
      type: Lab GitHub
      url: https://github.com/epfl-lara/scallion
      date_last_commit: 2025-09-02
    language: Scala
    type: Library
    license: Apache-2.0
    tags:
      - Development
    information:
      - type: Paper
        title: Zippy LL(1) Parsing with Derivatives
        url: https://infoscience.epfl.ch/record/284113
        notes:
          - label: Published at
            text: PLDI 2020
            url: https://pldi20.sigplan.org
    date_added: 2022-07-05
    date_updated: 2024-04-12
