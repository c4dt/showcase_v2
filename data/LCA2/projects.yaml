projects:
  iprp:
    name: iprp
    categories:
      - Security
    applications:
      - Infra
    description: Parallel redundancy protocol for IP networks
    layman_desc: >
      In critical systems like factories or power grids, a network failure can
      have serious consequences. iPRP sends the same data simultaneously over
      multiple network paths so that if one path fails, the data still arrives
      on time, providing fault-tolerant communication without requiring
      specialized hardware.
    tech_desc: >
      iPRP allows parallel transmission of data over a network for hard real
      time applications with simply installing an app on both the server and the
      client.
    code:
      type: Lab GitHub
      url: https://github.com/LCA2-EPFL/iprp
      date_last_commit: 2017-10-03
    tags:
      - Network
    language: C
    type: Application
    license: MIT
    information:
      - type: Paper
        title:
          "iPRP - the Parallel Redundancy Protofol for IP Networks: Protocol
          Design and Operation"
        url: https://infoscience.epfl.ch/record/216985
        notes:
          - label: Published in
            text: IEEE Transactions on Industrial Informatics 12, Issue 5 (2016)
            url: https://ieeexplore.ieee.org/xpl/tocresult.jsp?isnumber=7742433
    date_added: 2019-03-18
    date_updated: 2022-07-05

  commelec-api:
    name: commelec-api
    categories:
      - Security
    applications:
      - Infra
    description: API for the Commelec real-time microgrid framework
    layman_desc: >
      Microgrids are small local electricity networks that can include solar
      panels, batteries, and other power sources that need to be coordinated in
      real time. This library provides the communication building blocks that
      let the different devices in a microgrid exchange control messages
      efficiently and reliably.
    tech_desc: >
      This project defines a message format, based on Cap'n Proto, for encoding
      certain mathematical objects (i.e., real-valued symbolic expressions, sets
      and set-valued functions) as sequences of bytes.
    code:
      type: Lab GitHub
      url: https://github.com/LCA2-EPFL/commelec-api
      date_last_commit: 2017-06-29
    tags:
      - Network
      - Low-Level
    language: C++
    type: Library
    license: MIT
    date_added: 2019-03-18
    date_updated: 2022-07-05

  t-recs:
    name: T-RECS
    categories:
      - Security
    applications:
      - Infra
    description: Testbed for multi-agent real-time control of electric grids
    layman_desc: >
      Controlling an electric grid requires many software agents to communicate
      and make decisions in real time without errors. T-RECS is a software
      testbed that simulates this environment, allowing researchers to develop
      and test multi-agent grid control algorithms safely before deploying them
      on real infrastructure.
    tech_desc: >
      T-RECS is a software testbed for multi-agent real-time control of electric
      grids. T-RECS uses software containers to run each agent in a virtual
      environment. Agents are networked via Mininet, so real packets are
      exchanged using TCP/IP.
    code:
      type: Lab GitHub
      url: https://github.com/LCA2-EPFL/T-RECS
      date_last_commit: 2019-06-06
    tags:
      - Network
    language: Python
    type: Simulation
    license: MIT
    date_added: 2019-07-29
    date_updated: 2022-07-05
