projects:
  bdp:
    name: Bayesian Differential Privacy
    categories:
      - Learning
      - Privacy
    applications:
      - Info
    description: Data distribution-aware differential privacy
    layman_desc: >
      When organizations publish statistics derived from sensitive data, they
      use differential privacy to ensure individuals cannot be identified.
      Bayesian Differential Privacy improves on traditional approaches by taking
      into account what the data actually looks like, providing stronger and
      more realistic privacy guarantees for machine learning models without
      sacrificing as much accuracy.
    tech_desc: >
      Traditional differential privacy is independent of the data distribution.
      However, this is not well-matched with the modern machine learning
      con-text, where models are trained on specific data. As a result,
      achieving meaningful privacy guarantees in ML often excessively reduces
      accuracy. Bayesian differential privacy (BDP) takes into account the data
      distribution to provide more practical privacy guarantees.
    code:
      type: Personal GitHub
      url: https://github.com/AlekseiTriastcyn/bayesian-differential-privacy
      date_last_commit: 2020-08-12
    language: Python
    type: Experiments
    license: Apache-2.0
    tags:
      - Anonymity
    information:
      - type: Paper
        title: Bayesian Differential Privacy for Machine Learning
        url: https://arxiv.org/pdf/1901.09697.pdf
        notes:
          - label: Published at
            text: ICML 2020
            url: https://icml.cc/Conferences/2020
    date_added: 2021-11-04
    date_updated: 2024-03-20

  ader:
    name: ADER
    categories:
      - Learning
    applications:
      - Info
    description: Continual adaption of recommendation systems without forgetting
    layman_desc: >
      Recommendation systems — like those suggesting products or videos — need
      to keep up with new items as old ones become irrelevant, but updating them
      often causes the system to forget what it learned before. ADER is a method
      that lets recommendation systems adapt continuously to new data while
      retaining knowledge of past user preferences.
    tech_desc: >
      Recommendation systems typically require continual adaptation to take into
      account new and obsolete items. A major challenge in this situation is
      catastrophic forgetting, where the trained model forgets patterns it has
      learned before. We propose a method to mitigate this effect.
    code:
      type: Personal GitHub
      url: https://github.com/DoubleMuL/ADER
      date_last_commit: 2021-10-27
    language: Python
    type: Simulation
    license: MIT
    tags:
      - Decentralized
    information:
      - type: Paper
        title:
          "ADER: Adaptively Distilled Exemplar Replay Towards Continual Learning
          for Session-based Recommendation"
        url: https://arxiv.org/pdf/2007.12000.pdf
        notes:
          - label: Published at
            text: RECSYS 2020
            url: https://recsys.acm.org/recsys20/
    date_added: 2021-11-05
    date_updated: 2024-03-20
