projects:
  ai-data-platform-v1:
    title: AI Research Aiding Online Children Safety
    categories:
      - Learning
    applications:
      - Info
      - Gov
    description:
      Platform for detecting specific risks and threats children are facing
      online
    url: https://www.epfl.ch/labs/lsir/ai-research-aiding-online-children-safety
    layman_desc: >
      Children using smartphones can be exposed to harmful content or contact
      with dangerous individuals. This platform uses AI to detect such threats
      directly on the phone, without sending any personal content to external
      servers, protecting children's privacy while keeping them safer online.
    tech_desc: >
      Machine Learning classifiers and tools to help with the detection of
      specific risks and threats children are facing while using their newly
      acquired phones. The classifiers perform on par or better than what exists
      on the market, and have been adapted to run smoothly on a mobile phone.
      The analysis can therefore run on the mobile phone without having to send
      any content to any server.
    code:
      type: Private GitHub
    tags:
      - Image Classification
    type: Framework
    date_added: 2019-03-18
    date_updated: 2024-02-06

  ai-data-platform-v2:
    title: AI-Driven Classifier Building Pipeline
    categories:
      - Learning
    applications:
      - Info
    description:
      Platform for speeding up the development of Artificial-Intelligence
      classifiers
    url: https://www.epfl.ch/labs/lsir/ai-driven-classifier-building-pipeline
    layman_desc: >
      Building an AI system that can recognize images or categorize text usually
      requires large amounts of manually labeled data, which is slow and
      expensive to produce. This platform speeds up the process by combining
      weak supervision with active learning, so developers can build accurate
      classifiers with far less human labeling effort.
    tech_desc: >
      The platform aims at accelerating the process of building Artificial
      Intelligence classifiers for image and text classification.
    code:
      type: Private GitHub
    information:
      - type: Paper
        title: Weakly Supervised Active Learning with Cluster Annotation
        url: https://arxiv.org/pdf/1812.11780.pdf
        notes:
          - label: Published at
            text: NIPS'18
            url: https://neurips.cc/Conferences/2018
    tags:
      - Image Classification
    type: Framework
    date_added: 2019-05-22
    date_updated: 2023-03-21
    maturity: 2

  scilens:
    title: SciLens
    categories:
      - Learning
    applications:
      - Gov
      - Info
    description: Helper for science news evaluation
    url: https://scilens.epfl.ch
    layman_desc: >
      Not all news articles about science are equally trustworthy or accurate.
      SciLens helps non-expert readers evaluate how credible a science news
      article is by automatically analyzing signals from social media and
      scientific literature and presenting easy-to-understand quality
      indicators.
    tech_desc: >
      A framework helping non-experts to evaluate the quality of scientific news
      articles, based on indicators automatically generated using machine
      learning.
    code:
      type: Lab GitHub
      url: https://github.com/LSIR/SciLens
      date_last_commit: 2022-10-25
    information:
      - type: Paper
        title:
          "SciLens: Evaluating the Quality of Scientific News Articles Using
          Social Media and Scientific Literature Indicators"
        url: https://doi.org/10.1145/3308558.3313657
        notes:
          - label: Published at
            text: WWW'19
            url: https://www2019.thewebconf.org
      - type: Paper
        title:
          "SciLens News Platform: A System for Real-Time Evaluation of News
          Articles"
        url: https://doi.org/10.14778/3415478.3415521
        notes:
          - label: Published at
            text: VLDB'20
            url: https://vldb2020.org
      - type: Paper
        title:
          "SciClops: Detecting and Contextualizing Scientific Claims for
          Assisting Manual Fact-Checking"
        url: https://infoscience.epfl.ch/record/289989?
        notes:
          - label: Published at
            text: CIKM '21
            url: https://dl.acm.org/doi/10.1145/3459637.3482475
          - label: Slides
            text: SciClops
            url: https://scilens.epfl.ch/files/cikm2021.pptx
      - type: Paper
        title: "SciLander: Mapping the Scientific News Landscape"
        url: https://scilens.epfl.ch/files/icwsm2023.pdf
        notes:
          - label: Published at
            text: ICWSM '23
            url: https://ojs.aaai.org/index.php/ICWSM/article/view/22144
    tags:
