    language: Python
    license: GPL-3.0
    type: Application
    date_added: 2019-03-18
    date_updated: 2024-02-06

  media-observatory:
    title: Media Observatory
    categories:
      - Learning
    applications:
      - Gov
      - Info
    description: News landscape monitoring
    layman_desc: >
      The news media landscape is vast and hard to navigate, with different
      outlets covering the same events from very different angles. The Media
      Observatory maps news channels based on the topics they choose to cover,
      giving the public, journalists, and researchers an algorithmic tool to
      monitor bias, diversity, and credibility across the media ecosystem.
    tech_desc: >
      A model of the media landscape that maps news channels based on their
      selection of subjects. The observatory has the following key objectives:
      giving the public access to algorithmic solutions to monitor the news
      landscape, developing transparent quality and credibility indicators and
      creating a meeting point to foster multidisciplinary research
      opportunities
    url: https://www.mediaobservatory.com
    code:
      type: Private GitHub
      url: https://github.com/mediaobservatory
      date_last_commit: 2019-07-02
    tags:
      - Natural Language
    type: Application
    information:
      - type: Paper
        title: A Dynamic Embedding Model of the Media Landscape
        url: https://www.mediaobservatory.com/assets/papers/www19.pdf
        notes:
          - label: Published at
            text: WWW'18
            url: https://www2018.thewebconf.org
      - type: Paper
        title: "Selection Bias in News Coverage: Learning it, Fighting it"
        url: https://www.mediaobservatory.com/assets/papers/www18.pdf
        notes:
          - label: Published at
            text: WWW'19
            url: https://www2019.thewebconf.org
    date_added: 2019-09-04
    date_updated: 2024-02-12

  mozuma:
    title: Mozuma
    categories:
      - Learning
    applications:
      - Info
    description: Library of ML standardised models
    layman_desc: >
      Machine learning researchers often work with many different AI models that
      each have their own way of being loaded, run, and saved. Mozuma provides a
      unified interface so that working with different models feels consistent,
      making it easier to swap models in and out and manage their files.
    tech_desc: >
      Mozuma is a library containing a collection of machine learning models
      with standardised interface to run inference, train and manage model state
      files.
    code:
      type: Lab GitHub
      url: https://github.com/mozuma/mozuma
      date_last_commit: 2023-07-11
    tags:
      - PyTorch
    type: Library
    date_added: 2022-07-06
    date_updated: 2024-02-12

  commpass:
    title: CommPass
    description: >
      News article similarity visualization tool
    type: "Application"
    categories:
      - "Learning"
    applications:
      - "Info"
    tags:
      - "Adversarial"
      - "Machine Learning"
      - "Natural Language"
    layman_desc: >
      This tool visualizes how similar or different news articles about the same
      event are from multiple perspectives. It can show if articles have a
      positive or negative stance on the topic. This helps users understand if
      they are caught in a filter bubble and exposes them to diverse viewpoints.
      It also assists journalists in positioning their articles among others
      covering the same story.
    tech_desc: >
      The project aims to visualize semantic similarity and polarity of news
      articles covering a given media event. It extends the NewsTeller platform
      which processes over 1.5 million news articles per month. The goal is to
      provide intuitive visualization tools to explore the media landscape and
      enhance the NewsTeller platform.
    url: https://www.media-initiative.ch/project/commpass/
    date_added: 2024-03-19

  # Most common fields:
  upgrade_newsroom:
    title: Upgrading the Newsroom
    description: >
      Automated image selection system for news articles
    type: "Application"
    categories:
      - "Learning"
    applications:
      - "Info"
    tags:
      - "Adversarial"
      - "Machine Learning"
      - "Natural Language"
    layman_desc: >
      It is an automated system that can recommend suitable images to
      illustrate  news articles by analyzing the text content of the
      articles.  The system can handle inputs in multiple languages like German
      and French  by using aligned multilingual word embeddings.  It uses
      advanced neural network techniques like attention to identify  the most
      relevant parts of the text for retrieving matching images from a  large
      database.
    tech_desc: >
      The system fuses multiple textual sources (caption, body, headline,
      lead)  from news articles using a hierarchical attention mechanism to
      retrieve  relevant images.  It utilizes subword embeddings and
      self-attention to better encode  entities and capture important keywords
      within texts.  The model is trained on a large-scale multimodal
      multilingual dataset of  over 500k German and French news article-image
      pairs in a  weakly-supervised manner.
    url: https://modemos.epfl.ch/article
    information:
      # One or more of:
      - type: Paper
        title:
          "Upgrading the Newsroom: An Automated Image Selection System for News
          Articles"
        url: https://arxiv.org/abs/2004.11449
    date_added: 2024-03-19
