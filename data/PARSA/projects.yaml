projects:
  cloudsuite:
    title: CloudSuite
    categories:
      - Other
    applications:
      - Infra
    description: Benchmark suite for cloud services
    layman_desc: >
      When building or buying computer servers for internet services, it is
      important to know how they will perform under realistic workloads.
      CloudSuite is a collection of representative cloud applications packaged
      as ready-to-run benchmarks, allowing hardware designers and operators to
      measure and compare server performance fairly.
    tech_desc: >
      CloudSuite is a benchmark suite for cloud services. It consists of a
      number of applications that have been selected based on their popularity
      in today's datacenters. The benchmarks are based on real-world software
      stacks and represent real-world setups.
    url: http://cloudsuite.ch/
    code:
      type: Lab GitHub
      url: https://github.com/parsa-epfl/cloudsuite
      date_last_commit: 2023-06-25
    tags:
      - Cloud
      - Benchmark
    language: Dockerfiles
    type: Application
    information:
      - type: Paper
        title:
          "Clearing the clouds: a study of emerging scale-out workloads on
          modern hardware"
        url: https://infoscience.epfl.ch/record/173764
        notes:
          - label: Published at
            text: ASPLOS 2012
            url: https://dblp.org/db/conf/asplos/asplos2012.html
    license: CloudSuite, other
    date_added: 2019-03-18
    date_updated: 2024-03-15
  qflex:
    title: QFlex
    categories:
      - Other
    applications:
      - Infra
    description:
      State-of-the-art modeling tools for the computer architecture community
    layman_desc: >
      Designing new computer processors requires testing them long before any
      physical hardware exists. QFlex is a simulator that models an entire
      multi-machine system in software, allowing architects to experiment with
      new processor designs and study their performance under realistic
      workloads without building actual hardware.
    tech_desc: >
      QFlex is a full-system cycle-accurate computer architecture simulator of
      multi-node computer systems.
    url: https://qflex.epfl.ch/
    code:
      type: Lab GitHub
      url: https://github.com/parsa-epfl/qflex
      date_last_commit: 2026-03-03
    lines_of_code: "Flexus: 50000, Qemu: 100000"
    tags:
      - Network
    language: C, C++
    license: BSD-3-Clause
    type: Toolset
    information:
      - type: Paper
        title: "SimFlex: Statistical Sampling of Computer System Simulation"
        url: https://infoscience.epfl.ch/record/112669
        notes:
          - label: Published in
            text: IEEE Micro
            url: https://ieeexplore.ieee.org/document/1677500
    notes: >
      Some issues with regard to Oracle licenses
    date_added: 2019-03-18
    date_updated: 2024-03-15

  hbfpemulator:
    title: ColTraIn HBFP Training Emulator
    categories:
      - Other
    applications:
      - Info
    description: >
      Co-located deep neural network training and inference
    layman_desc: >
      Training AI models requires enormous amounts of computation. This project
      explores a smarter way to represent numbers inside AI training hardware,
      combining the accuracy of standard floating-point with the hardware
      efficiency of fixed-point arithmetic, resulting in AI accelerators that
      are significantly faster without sacrificing accuracy.
    tech_desc: >
      HBFP is a hybrid Block Floating-Point (BFP) - Floating-Point (FP) number
      representation for DNN training introduced by ColTraIn: Co-located DNN
      Training and Inference team of PARSA and MLO at EPFL. HBFP offers the best
      of both worlds: the high accuracy of floating-point at the superior
      hardware density of fixed-point by performing all dot products in BFP and
      other operations in FP32. For a wide variety of models, HBFP matches
      floating-point’s accuracy while enabling hardware implementations that
      deliver up to 8.5x higher throughput. This repository is for ongoing
      research on training DNNs with HBFP.
    url: https://parsa.epfl.ch/coltrain/
    tags:
      - Deep Neural Networks
    type: Application
    code:
      type: Lab Github
      url: https://github.com/parsa-epfl/HBFPEmulator
      date_last_commit: 2023-02-16
    language: Python
    license: BSD-3-Clause
    information:
      - type: Paper
        title: Training DNNs with Hybrid Block Floating Point
        url: https://infoscience.epfl.ch/record/266344
        notes:
          - label: Published at
            text: NeurIPS 2018
            url: https://neurips.cc/Conferences/2018
      - type: Paper
        title: "Dynamic Model Pruning with Feedback"
        url: https://infoscience.epfl.ch/record/277539
        notes:
          - label: Published in
            text: ICLR 2020
            url: https://iclr.cc/virtual_2020/poster_SJem8lSFwB.html
      - type: Blog post
        title: "Numerical Encoding for DNN Accelerators"
        url: https://www.sigarch.org/numerical-encoding-for-dnn-accelerators/
        notes:
          - label: Published on
            text: ACM SigArch Computer Architecture Today
            url: https://www.sigarch.org/blog/
    date_added: 2021-05-27
    date_updated: 2024-03-15
