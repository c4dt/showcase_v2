projects:
  openfoodrepo:
    title: The Open Food Repo
    categories:
      - Other
    applications:
      - Health
      - Info
    description: Database of barcoded food products
    layman_desc: >
      The Open Food Repo is an open access database on information about
      barcoded food products sold in Switzerland. Accessible through an open
      API, it is the largest open data source on Swiss products.
    tech_desc: >
      Open Food Repo is a crowdsourced, openly licensed database of barcoded
      food products available in Switzerland, exposed via a documented REST API.
      It stores product names, ingredients, nutritional values, and images, and
      serves as the product data backbone for the MyFoodRepo dietary tracking
      platform.
    maturity: 3
    url: https://www.foodrepo.org
    code:
      type: Lab GitHub
      url: https://github.com/digitalepidemiologylab/foodrepo_api
      date_last_commit: 2020-08-24
    license: CC BY 4.0
    type: Application
    tags:
      - Database
    language: JavaScript
    information:
      - type: Mobile App
        title: My Food Repo
        url: https://www.myfoodrepo.org
    date_added: 2019-03-18
    date_updated: 2024-04-14
  foodandyou:
    title: Food & You
    categories:
      - Other
    applications:
      - Health
    description: Track your individual response to food and help advance science
    layman_desc: >
      Take part in an exciting citizen science project on personalized
      nutrition!  Citizen science enables volunteers and professionals to make
      discoveries together. By participating in this project, you will
      understand how your blood sugar levels change in response to the food you
      eat.
    tech_desc: >
      Food & You is a digital epidemiology cohort study that combines continuous
      glucose monitoring (CGM), dietary logging via the MyFoodRepo app, and gut
      microbiome sampling to investigate personalized glycemic responses to
      food. Participants scan barcodes and photograph meals, generating
      longitudinal data used in downstream nutritional and microbiome research.
    maturity: 3
    tags:
      - Survey
      - Medical
    type: Application
    url: https://www.foodandyou.ch
    date_added: 2021-01-21
    date_updated: 2024-04-14
  crowdbreaks:
    title: CrowdBreaks
    categories:
      - Learning
    applications:
      - Health
    description:
      Track health trends using public social media data and crowdsourcing
    layman_desc: >
      Social media contains a wealth of real-time information about how people
      feel and what health topics they are discussing. CrowdBreaks monitors
      public posts to track trends in health-related attitudes — such as vaccine
      sentiment — and uses crowdsourcing to label data so that automated models
      can be trained and kept up to date.
    tech_desc: >
      CrowdBreaks is an open platform that combines streaming ingestion of
      public social media data with crowdsourced labeling and automated machine
      learning pipelines to track population-level health trends over time. It
      provides real-time dashboards of sentiment and topic trends and is
      designed to be extended to new health surveillance use cases.
    url: https://www.crowdbreaks.org
    maturity: 3
    tags:
      - Survey
      - CrowdSource
      - Medical
    code:
      type: Lab GitHub
      url: https://github.com/digitalepidemiologylab/crowdbreaks
      date_last_commit: 2023-05-25
    type: Application
    license: MIT
    information:
      - type: Paper
        title:
          "Crowdbreaks: Tracking Health Trends Using Public Social Media Data
          and Crowdsourcing"
        url: https://infoscience.epfl.ch/record/265362
        notes:
          - label: Published in
            text: Frontiers Public Health 2019
            url: https://www.frontiersin.org/articles/10.3389/fpubh.2019.00081
    date_added: 2021-01-21
    date_updated: 2024-04-14
  aicrowd:
    title: AIcrowd
    categories:
      - Learning
    applications:
      - Info
    description: Open platform for data science challenges
    layman_desc: >
      AIcrowd is a platform where researchers and companies can post data
      science challenges and anyone in the world can submit solutions.
      Participants compete to build the best AI models, which accelerates
      progress on difficult problems and makes cutting-edge research more
      collaborative and open.
    tech_desc: >
      AIcrowd is an open crowdsourcing platform for reproducible AI research
      challenges. It provides tooling for dataset hosting, submission
      evaluation, leaderboards, and baseline implementations. The platform
      supports a wide variety of task types including reinforcement learning,
      natural language processing, and biomedical AI, and has hosted challenges
      in partnership with academic and industry organizations.
    url: https://www.aicrowd.com
    code:
      type: Project GitHub
      url: https://github.com/AIcrowd
      date_last_commit: 2026-04-12
    language: JavaScript, Ruby
    license: AGPL-3.0
    tags:
      - CrowdSource
    type: Application
    maturity: 3
    date_added: 2021-01-21
    date_updated: 2024-04-14
  txcl:
    title: txcl
    categories:
      - Learning
    applications:
      - Info
    description: Reproducible Text Classification
    layman_desc: >
      Automatically sorting text — such as tweets or news articles — into
      categories is a common task in data science, but results are often hard to
      reproduce. txcl is a toolkit that standardizes and simplifies training and
      evaluating text classification models, making experiments easier to share
      and replicate.
    tech_desc: >
      txcl is a Python library for reproducible text classification that wraps
      standard NLP workflows including data loading, preprocessing, fine-tuning
      of transformer-based models, and evaluation. It provides a configuration-
      driven interface to support consistent experimental setups and was
      developed in the context of social media health surveillance research.
    code:
      type: Lab GitHub
      url: https://github.com/digitalepidemiologylab/text-classification
      date_last_commit: 2022-02-24
    language: Python
    license: MIT
    tags:
      - CrowdSource
      - Natural Language
    type: Application
    maturity: 1
    date_added: 2022-07-07
    date_updated: 2024-04-14
  dietary-consistency-gut-microbiota:
    title: Dietary Consistency and Gut Microbiota
    description:
      "Analysis code for a Swiss cohort study on dietary patterns and gut
      microbiota diversity."
    layman_desc: >
      What you eat every day shapes the bacteria living in your gut. This study
      uses five years of dietary tracking data from over 1000 Swiss participants
      to investigate how consistent and healthy eating habits relate to gut
      microbiome diversity, a key marker of intestinal health.
    tech_desc: >
      Analysis pipeline for the "Food & You" digital cohort studying
      associations between dietary consistency, quality metrics, and gut
      microbiota diversity. Includes alpha/beta diversity correlations,
      differential abundance analysis via BIRDMan and QIIME2, taxa correlation
      studies, and machine learning prediction of microbiome composition from
      longitudinal dietary variables.
    type: Experiments
    categories:
      - Other
    applications:
      - Health
    tags:
      - Survey
      - Features
      - Medical
    code:
      type: Lab Github
      url: https://github.com/digitalepidemiologylab/dietary-consistency-and-quality-associated-with-gut-microbiota-diversity-paper
      date_last_commit: 2025-08-08
    language: Python
    date_added: 2026-03-03
    showcase_interest:
      carine: 1
  mindays-estimation:
    title: Minimum Days Estimation
    description:
      "Code for estimating the optimal study duration for reliable dietary
      intake information."
    layman_desc: >
      How many days of food diary do you need to fill in before the data becomes
      reliable? This study analyzes real-world dietary logs from a digital
      cohort to determine the minimum number of tracking days needed for
      accurate nutritional assessments, accounting for day-of-week variation and
      individual differences.
    tech_desc: >
      Analysis notebooks applying Linear Mixed Models (LMM), Coefficient of
      Variation (CV), and Intraclass Correlation Coefficient (ICC) methods to
      determine the minimum dietary monitoring duration for reliable intake
      estimation. Analyzes data from the "Food & You" digital cohort using
      Python scientific computing libraries (pandas, numpy, statsmodels,
      pingouin).
    type: Experiments
    categories:
      - Other
    applications:
      - Health
    tags:
      - Survey
      - Predictor
    code:
      type: Lab Github
      url: https://github.com/digitalepidemiologylab/mindays-estimation-paper
      date_last_commit: 2025-03-27
    language: Python
    date_added: 2026-03-03
    showcase_interest:
      carine: 1
  myfoodrepo:
    title: MyFoodRepo
    description:
      "Nutrition tracking platform with food image segmentation and annotation
      tools."
    layman_desc: >
      MyFoodRepo lets users photograph their meals to automatically log what
      they eat. AI-powered image segmentation identifies food items in photos
      and links them to a large nutritional database, enabling researchers to
      collect detailed and accurate dietary data at scale.
    tech_desc: >
      Ruby on Rails web platform implementing food image segmentation via an
      AI/CrowdAI API, product database synchronization with FoodRepo, REST API,
      and annotation management workflows. Supports direct upload, segmentation
      status tracking, and data serialization for large-scale digital dietary
      cohort studies.
    type: Application
    categories:
      - Other
    applications:
      - Health
    tags:
      - Images
      - Mobile App
    code:
      type: Lab Github
      url: https://github.com/digitalepidemiologylab/nutrition-tracking-platform-v2
      date_last_commit: 2025-04-16
    language: Ruby
    date_added: 2026-03-03
    showcase_interest:
      carine: 1
  meal-pattern-analysis:
    title: Meal Timing Analysis
    description:
      "Analysis of meal timing effects on dietary quality and glucose response."
    layman_desc: >
      Does eating at irregular times affect how your body handles sugar? This
      study uses continuous glucose monitors and dietary logs from a real-world
      cohort to examine how the timing of meals throughout the day relates to
      eating quality and blood sugar regulation, including differences between
      weekdays and weekends.
    tech_desc: >
      Analysis notebooks for the "Food & You" digital cohort examining meal
      timing and dietary quality effects on glycemic response. Implements
      partial correlations, linear mixed effects models, mediation analysis,
      weekend effects, and incremental area under the curve (iAUC) determinants
      using CGM-derived and dietary intake data.
    type: Experiments
    categories:
      - Other
    applications:
      - Health
    tags:
      - Survey
      - Time Series
      - Medical
    code:
      type: Lab Github
      url: https://github.com/digitalepidemiologylab/meal-pattern-analysis-paper
      date_last_commit: 2025-12-20
    language: Python
    date_added: 2026-03-03
    showcase_interest:
      carine: 1
  food-additives-gut-microbiota:
    title: Food Additive Gut Microbiota
    description:
      "Code for analyzing food additive exposure and its impact on gut
      microbiota diversity."
    layman_desc: >
      Ultra-processed foods contain many additives that may affect the bacteria
      in our gut. This study maps additive exposure from barcode scans of
      packaged food products to participants' gut microbiome profiles,
      identifying which additive combinations are associated with lower gut
      bacteria diversity.
    tech_desc: >
      Analysis pipeline using non-negative matrix factorization (NMF) to
      identify additive co-consumption patterns from MyFoodRepo barcode logs and
      OpenFoodFacts ingredient data, followed by z-score normalization,
      composite contrast metrics, and BIRDMan differential abundance analysis to
      assess associations between food additive mixtures and gut microbiota
      diversity in the "Food & You" digital cohort.
    type: Experiments
    categories:
      - Other
    applications:
      - Health
    tags:
      - Survey
      - Features
      - Medical
    code:
      type: Lab Github
      url: https://github.com/digitalepidemiologylab/food-additives-gut-microbiota-public
      date_last_commit: 2026-01-22
    language: Python
    date_added: 2026-03-03
    showcase_interest:
      carine: 1
